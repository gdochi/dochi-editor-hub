<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box}
html,body{width:100%;height:100%;margin:0;overflow:hidden;background:transparent;color:#edf1f7;font-family:Arial,Helvetica,sans-serif;user-select:none}
body{display:flex;align-items:stretch;justify-content:center;padding:18px}
.app{width:min(1180px,100%);height:100%;min-height:560px;background:rgba(17,20,28,.96);border:1px solid #3a4254;border-radius:8px;box-shadow:0 18px 42px rgba(0,0,0,.42);display:grid;grid-template-rows:auto 1fr auto;overflow:hidden}
.topbar{height:72px;display:flex;align-items:center;justify-content:space-between;gap:16px;padding:14px 16px;border-bottom:1px solid #303747;background:rgba(24,29,40,.96)}
.title{font-size:20px;font-weight:bold;letter-spacing:0}
.meta{font-size:12px;color:#aab3c4;margin-top:4px}
.actions{display:flex;align-items:center;gap:8px;flex-wrap:wrap;justify-content:flex-end}
button,select,input{font:inherit}
button{height:34px;border:1px solid #536079;border-radius:6px;background:#293142;color:#edf1f7;padding:0 12px;cursor:pointer}
button:hover{background:#344057}
button.primary{background:#2f6fbd;border-color:#3f86dd;color:#fff}
button.primary:hover{background:#367ed6}
button.danger{background:#59313a;border-color:#83505a}
button:disabled{opacity:.45;cursor:default}
select,input{height:34px;border:1px solid #4b556d;border-radius:6px;background:#151a24;color:#edf1f7;padding:0 10px}
.content{display:grid;grid-template-columns:360px 1fr;min-height:0}
.sidebar{border-right:1px solid #303747;display:grid;grid-template-rows:auto 1fr;min-height:0;background:rgba(20,24,34,.76)}
.filters{padding:12px;border-bottom:1px solid #303747;display:grid;grid-template-columns:1fr;gap:8px}
.list{overflow:auto;padding:8px}
.pkg{width:100%;text-align:left;border:1px solid transparent;background:transparent;border-radius:6px;padding:10px;display:block;height:auto}
.pkg:hover{background:#252d3d}
.pkg.active{background:#293850;border-color:#4d79b0}
.pkgName{font-size:14px;font-weight:bold;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.pkgMeta{display:flex;gap:6px;flex-wrap:wrap;margin-top:7px}
.chip{font-size:11px;color:#c8d1df;border:1px solid #49546b;border-radius:999px;padding:2px 7px;background:rgba(255,255,255,.04)}
.chip.ok{border-color:#4d8a68;color:#bff0d2}
.detail{display:grid;grid-template-rows:auto 1fr;min-width:0;min-height:0}
.detailHead{padding:16px;border-bottom:1px solid #303747;display:flex;justify-content:space-between;align-items:flex-start;gap:12px}
.detailTitle{font-size:22px;font-weight:bold;word-break:break-word}
.detailDesc{margin-top:8px;color:#c2cad8;line-height:1.45;max-width:680px}
.detailTools{display:flex;gap:8px;align-items:center;flex-wrap:wrap;justify-content:flex-end}
.detailBody{min-height:0;overflow:auto;padding:14px 16px}
.grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.panel{border:1px solid #3a4254;border-radius:8px;background:rgba(255,255,255,.035);padding:12px;min-height:96px}
.panelTitle{font-weight:bold;font-size:13px;color:#dce5f3;margin-bottom:8px}
.line{display:flex;justify-content:space-between;gap:12px;border-top:1px solid rgba(255,255,255,.07);padding:8px 0;color:#cbd4e4;font-size:13px}
.line:first-of-type{border-top:0}
.line span:last-child{text-align:right;color:#fff;word-break:break-word}
.deps{display:flex;flex-direction:column;gap:6px}
.dep{font-size:12px;color:#cbd4e4;border:1px solid #3d4659;border-radius:6px;padding:7px;background:rgba(0,0,0,.12);word-break:break-word}
.empty{height:100%;display:flex;align-items:center;justify-content:center;color:#8f99ad;text-align:center;padding:24px}
.status{min-height:40px;border-top:1px solid #303747;background:rgba(14,17,24,.96);display:flex;align-items:center;justify-content:space-between;gap:12px;padding:8px 16px;color:#cbd4e4;font-size:13px}
.bar{height:7px;width:220px;background:#252c3a;border-radius:999px;overflow:hidden}
.barFill{height:100%;width:0;background:#4a93e8}
.modal{position:fixed;inset:0;background:rgba(0,0,0,.5);display:none;align-items:center;justify-content:center;padding:24px;z-index:50}
.modal.show{display:flex}
.dialog{width:min(720px,100%);max-height:min(76vh,680px);display:grid;grid-template-rows:auto 1fr auto;border:1px solid #536079;border-radius:8px;background:#151a24;box-shadow:0 22px 60px rgba(0,0,0,.55);overflow:hidden}
.dialogHead{padding:14px 16px;border-bottom:1px solid #303747}
.dialogTitle{font-size:18px;font-weight:bold}
.dialogDesc{margin-top:6px;color:#b8c2d2;font-size:13px}
.overwriteList{overflow:auto;padding:10px 12px;display:flex;flex-direction:column;gap:8px}
.overwriteRow{display:grid;grid-template-columns:auto 1fr auto;gap:10px;align-items:start;border:1px solid #3a4254;border-radius:6px;padding:9px;background:rgba(255,255,255,.035)}
.overwriteName{font-weight:bold;font-size:13px}
.overwritePath{font-size:12px;color:#aeb8c9;word-break:break-word;margin-top:3px}
.dialogActions{border-top:1px solid #303747;padding:12px 16px;display:flex;justify-content:space-between;gap:10px}
.checkAll{display:flex;align-items:center;gap:8px;color:#d7deeb;font-size:13px}
@media(max-width:820px){
body{padding:8px}
.app{min-height:0}
.content{grid-template-columns:1fr}
.sidebar{border-right:0;border-bottom:1px solid #303747;max-height:42vh}
.grid{grid-template-columns:1fr}
.topbar{height:auto;align-items:flex-start;flex-direction:column}
.actions{justify-content:flex-start}
.status{align-items:flex-start;flex-direction:column}
}
</style>
</head>
<body>
<div class="app">
  <div class="topbar">
    <div>
      <div class="title">Script Library</div>
      <div class="meta" id="repoLine">Loading repository...</div>
    </div>
    <div class="actions">
      <select id="versionFilter">
        <option value="all">All</option>
        <option value="common">Common</option>
        <option value="forge_1_20_1">Forge 1.20.1</option>
        <option value="fabric_1_21_1">Fabric 1.21.1</option>
      </select>
      <button type="button" id="refreshBtn">Refresh</button>
      <button type="button" id="closeBtn">Close</button>
    </div>
  </div>
  <div class="content">
    <div class="sidebar">
      <div class="filters">
        <input id="searchInput" type="search" placeholder="Search packages">
      </div>
      <div class="list" id="packageList"><div class="empty">Loading packages...</div></div>
    </div>
    <div class="detail">
      <div class="detailHead">
        <div>
          <div class="detailTitle" id="detailTitle">Select a package</div>
          <div class="detailDesc" id="detailDesc">Package details will appear here.</div>
        </div>
        <div class="detailTools">
          <select id="versionSelect"></select>
          <button type="button" class="primary" id="installBtn" disabled>Install</button>
        </div>
      </div>
      <div class="detailBody" id="detailBody"><div class="empty">No package selected.</div></div>
    </div>
  </div>
  <div class="status">
    <div id="statusText">Waiting for server...</div>
    <div class="bar"><div class="barFill" id="barFill"></div></div>
  </div>
</div>

<div class="modal" id="overwriteModal">
  <div class="dialog">
    <div class="dialogHead">
      <div class="dialogTitle">Existing files found</div>
      <div class="dialogDesc">Choose which existing files should be overwritten.</div>
    </div>
    <div class="overwriteList" id="overwriteList"></div>
    <div class="dialogActions">
      <label class="checkAll"><input type="checkbox" id="selectAllOverwrite" checked> Select all</label>
      <div>
        <button type="button" id="overwriteCancelBtn">Cancel</button>
        <button type="button" class="primary" id="overwriteConfirmBtn">Install selected</button>
      </div>
    </div>
  </div>
</div>

<script>
var INIT = window.cnpc && window.cnpc.initData ? window.cnpc.initData : {}
var state = {packages:[],selectedKey:"",selectedVersion:"",pendingOverwrite:null,busy:false}
var els = {}

function byId(id){return document.getElementById(id)}
function esc(text){return String(text == null ? "" : text).replace(/[&<>"']/g,function(c){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[c]})}
function sendEvt(name,data){if(window.cnpc && typeof window.cnpc.sendEvent === "function")window.cnpc.sendEvent(name,data || {})}
function closeGui(){if(window.cnpc && typeof window.cnpc.close === "function")window.cnpc.close()}
function setStatus(text){els.statusText.textContent = String(text || "")}
function setProgress(current,total){
  var pct = 0
  if(total > 0)pct = Math.max(0,Math.min(100,Math.round(current / total * 100)))
  els.barFill.style.width = pct + "%"
}
function selectedGroup(){
  var i
  for(i=0;i<state.packages.length;i++)if(state.packages[i].key === state.selectedKey)return state.packages[i]
  return null
}
function selectedVersion(group){
  var g = group || selectedGroup()
  var list = g && g.versions ? g.versions : []
  var i
  for(i=0;i<list.length;i++)if(list[i].version === state.selectedVersion)return list[i]
  return list[0] || null
}
function versionLabel(value){
  if(value === "forge_1_20_1")return "Forge 1.20.1"
  if(value === "fabric_1_21_1")return "Fabric 1.21.1"
  if(value === "common")return "Common"
  return value || "Unknown"
}
function filteredPackages(){
  var q = String(els.searchInput.value || "").toLowerCase()
  var vf = String(els.versionFilter.value || "all")
  var out = []
  var i,g,hay
  for(i=0;i<state.packages.length;i++){
    g = state.packages[i]
    if(vf !== "all" && String(g.mcVersion || "") !== vf)continue
    hay = [g.package,g.editor,g.mcVersion,g.description].join(" ").toLowerCase()
    if(q && hay.indexOf(q) < 0)continue
    out.push(g)
  }
  return out
}
function renderList(){
  var list = filteredPackages()
  var html = ""
  var i,g,active,installed
  if(!list.length){
    els.packageList.innerHTML = '<div class="empty">No packages matched.</div>'
    renderDetail()
    return
  }
  if(!state.selectedKey)state.selectedKey = list[0].key
  for(i=0;i<list.length;i++){
    g = list[i]
    active = g.key === state.selectedKey ? " active" : ""
    installed = g.installedVersion ? '<span class="chip ok">Installed '+esc(g.installedVersion)+'</span>' : '<span class="chip">Not installed</span>'
    html += '<button type="button" class="pkg'+active+'" data-key="'+esc(g.key)+'">'
      + '<div class="pkgName">'+esc(g.package)+'</div>'
      + '<div class="pkgMeta"><span class="chip">'+esc(versionLabel(g.mcVersion))+'</span><span class="chip">'+esc(g.editor)+'</span><span class="chip">Latest '+esc(g.latest || "-")+'</span>'+installed+'</div>'
      + '</button>'
  }
  els.packageList.innerHTML = html
  bindPackageRows()
  renderDetail()
}
function bindPackageRows(){
  var nodes = els.packageList.querySelectorAll("[data-key]")
  var i
  for(i=0;i<nodes.length;i++){
    nodes[i].onclick = function(){
      state.selectedKey = this.getAttribute("data-key")
      state.selectedVersion = ""
      renderList()
    }
  }
}
function renderDetail(){
  var g = selectedGroup()
  var v,i,depHtml
  els.versionSelect.innerHTML = ""
  if(!g){
    els.detailTitle.textContent = "Select a package"
    els.detailDesc.textContent = "Package details will appear here."
    els.detailBody.innerHTML = '<div class="empty">No package selected.</div>'
    els.installBtn.disabled = true
    return
  }
  for(i=0;i<g.versions.length;i++){
    var opt = document.createElement("option")
    opt.value = g.versions[i].version
    opt.textContent = g.versions[i].version
    els.versionSelect.appendChild(opt)
  }
  if(!state.selectedVersion && g.versions.length)state.selectedVersion = g.versions[0].version
  els.versionSelect.value = state.selectedVersion
  v = selectedVersion(g)
  els.detailTitle.textContent = g.package
  els.detailDesc.textContent = (v && v.description) || g.description || "No description."
  els.installBtn.disabled = !v || state.busy
  depHtml = ""
  if(v && v.dependencies && v.dependencies.length){
    for(i=0;i<v.dependencies.length;i++){
      depHtml += '<div class="dep">'+esc(v.dependencies[i].type)+': '+esc(v.dependencies[i].path || v.dependencies[i].id || "-")+(v.dependencies[i].required===false?' <span class="chip">optional</span>':'')+'</div>'
    }
  }else{
    depHtml = '<div class="dep">No declared dependencies.</div>'
  }
  els.detailBody.innerHTML =
    '<div class="grid">'
    + '<div class="panel"><div class="panelTitle">Package</div>'
    + '<div class="line"><span>Editor</span><span>'+esc(g.editor)+'</span></div>'
    + '<div class="line"><span>Minecraft</span><span>'+esc(versionLabel(g.mcVersion))+'</span></div>'
    + '<div class="line"><span>Installed</span><span>'+esc(g.installedVersion || "none")+'</span></div>'
    + '</div>'
    + '<div class="panel"><div class="panelTitle">Version</div>'
    + '<div class="line"><span>Selected</span><span>'+esc(v ? v.version : "-")+'</span></div>'
    + '<div class="line"><span>Files</span><span>'+esc(v ? v.fileCount : 0)+'</span></div>'
    + '<div class="line"><span>Player scripts</span><span>'+esc(v ? v.playerScriptCount : 0)+'</span></div>'
    + '</div>'
    + '<div class="panel" style="grid-column:1/-1"><div class="panelTitle">Dependencies</div><div class="deps">'+depHtml+'</div></div>'
    + '</div>'
}
function installSelected(){
  var g = selectedGroup()
  var v = selectedVersion(g)
  if(!g || !v || state.busy)return
  state.busy = true
  els.installBtn.disabled = true
  setStatus("Preparing install...")
  setProgress(0,1)
  sendEvt("script_library_install",{key:g.key,version:v.version})
}
function showOverwrite(data){
  var files = data && data.files ? data.files : []
  var html = ""
  var i,f,label
  state.pendingOverwrite = data || null
  for(i=0;i<files.length;i++){
    f = files[i]
    label = f.state === "same" ? "same" : (f.state === "changed" ? "changed" : "existing")
    html += '<label class="overwriteRow">'
      + '<input type="checkbox" data-overwrite-key="'+esc(f.key)+'" checked>'
      + '<span><span class="overwriteName">'+esc(f.name)+'</span><span class="overwritePath">'+esc(f.path)+'</span></span>'
      + '<span class="chip">'+esc(label)+'</span>'
      + '</label>'
  }
  els.overwriteList.innerHTML = html || '<div class="empty">No existing files.</div>'
  els.selectAllOverwrite.checked = true
  els.overwriteModal.classList.add("show")
}
function confirmOverwrite(){
  var checks = els.overwriteList.querySelectorAll("[data-overwrite-key]:checked")
  var selected = []
  var i
  for(i=0;i<checks.length;i++)selected.push(checks[i].getAttribute("data-overwrite-key"))
  els.overwriteModal.classList.remove("show")
  sendEvt("script_library_install_confirm",{requestId:state.pendingOverwrite ? state.pendingOverwrite.requestId : "",selectedKeys:selected})
}
function cancelOverwrite(){
  els.overwriteModal.classList.remove("show")
  sendEvt("script_library_install_cancel",{requestId:state.pendingOverwrite ? state.pendingOverwrite.requestId : ""})
  state.pendingOverwrite = null
  state.busy = false
  renderDetail()
}
function applyState(data){
  if(!data || data.ok === false){
    setStatus(data && data.error ? data.error : "Failed to load packages.")
    els.packageList.innerHTML = '<div class="empty">Package load failed.</div>'
    return
  }
  state.packages = data.packages || []
  els.repoLine.textContent = (data.repo || INIT.repo || "repository") + " / " + (data.branch || INIT.branch || "main") + " / " + (data.customNpcsRoot || "")
  setStatus("Loaded " + state.packages.length + " package(s)." + (data.errors && data.errors.length ? " Skipped " + data.errors.length + "." : ""))
  state.busy = false
  renderList()
  setProgress(0,1)
}
function applyProgress(data){
  if(!data)return
  if(data.message)setStatus(data.message)
  if(data.total)setProgress(data.current || 0,data.total)
  if(data.status === "ready")state.busy = false
}
function applyInstallResult(data){
  state.busy = false
  state.pendingOverwrite = null
  renderDetail()
  if(data && data.ok){
    setStatus(data.package + " " + data.version + " installed. Wrote " + data.written + ", skipped " + data.skipped + ".")
    setProgress(1,1)
  }else{
    setStatus(data && data.error ? data.error : "Install failed.")
    setProgress(0,1)
  }
}
function bind(){
  els.refreshBtn.onclick = function(){
    if(state.busy)return
    state.busy = true
    setStatus("Refreshing...")
    sendEvt("script_library_refresh",{})
  }
  els.closeBtn.onclick = closeGui
  els.searchInput.oninput = renderList
  els.versionFilter.onchange = function(){state.selectedKey = "";state.selectedVersion = "";renderList()}
  els.versionSelect.onchange = function(){state.selectedVersion = String(this.value || "");renderDetail()}
  els.installBtn.onclick = installSelected
  els.overwriteConfirmBtn.onclick = confirmOverwrite
  els.overwriteCancelBtn.onclick = cancelOverwrite
  els.selectAllOverwrite.onchange = function(){
    var checks = els.overwriteList.querySelectorAll("[data-overwrite-key]")
    var i
    for(i=0;i<checks.length;i++)checks[i].checked = !!els.selectAllOverwrite.checked
  }
}
function init(){
  var ids = ["repoLine","versionFilter","refreshBtn","closeBtn","searchInput","packageList","detailTitle","detailDesc","versionSelect","installBtn","detailBody","statusText","barFill","overwriteModal","overwriteList","selectAllOverwrite","overwriteCancelBtn","overwriteConfirmBtn"]
  var i
  for(i=0;i<ids.length;i++)els[ids[i]] = byId(ids[i])
  els.repoLine.textContent = (INIT.repo || "repository") + " / " + (INIT.branch || "main")
  bind()
  if(window.cnpc && typeof window.cnpc.onEvent === "function"){
    window.cnpc.onEvent("scriptLibraryState",applyState)
    window.cnpc.onEvent("scriptLibraryProgress",applyProgress)
    window.cnpc.onEvent("scriptLibraryOverwrite",showOverwrite)
    window.cnpc.onEvent("scriptLibraryInstallResult",applyInstallResult)
  }
  sendEvt("script_library_ready",{})
}
init()
</script>
</body>
</html>
