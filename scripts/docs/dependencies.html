<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Dochi Script Dependencies</title>
<style>
:root{--bg:#f6f8fb;--panel:#fff;--text:#17202d;--muted:#657184;--line:#d8e0eb;--line2:#ebf0f6;--main:#e8f2ff;--util:#e7f8ef;--html:#f1eefc}
*{box-sizing:border-box}
html,body{min-width:2200px}
body{margin:0;background:var(--bg);color:var(--text);font:14px/1.45 Arial,sans-serif}
header{padding:24px 32px 18px;background:#fff;border-bottom:1px solid var(--line)}
h1{margin:0 0 6px;font-size:26px;letter-spacing:0}
h2{font-size:17px;margin:0 0 12px}
code{background:#eef2f7;border:1px solid #dbe2ec;border-radius:4px;padding:1px 5px;font-family:Consolas,Menlo,monospace;font-size:12px;overflow-wrap:anywhere}
.sub{color:var(--muted)}
.wrap{width:2200px;padding:18px 32px 34px}
.stats{display:grid;grid-template-columns:repeat(3,220px);gap:12px;margin-top:16px}
.stat{background:#fff;border:1px solid var(--line);border-radius:8px;padding:14px}
.stat b{display:block;font-size:22px;margin-bottom:2px}
.controls{display:grid;grid-template-columns:1fr;gap:10px;margin:0 0 16px;width:680px}
input{width:100%;height:38px;border:1px solid var(--line);border-radius:6px;padding:0 10px;background:#fff;color:var(--text)}
table{width:2136px;border-collapse:collapse;background:#fff;border:1px solid var(--line);table-layout:fixed}
th,td{border-bottom:1px solid var(--line2);border-right:1px solid var(--line2);padding:10px 12px;text-align:left;vertical-align:top}
th{font-size:12px;color:var(--muted);background:#f9fbfe}
tr:nth-child(even) td{background:#f8fafc}
th:nth-child(1),td:nth-child(1){width:420px}
th:nth-child(2),td:nth-child(2){width:1080px}
th:nth-child(3),td:nth-child(3){width:636px}
.badge{display:inline-flex;align-items:center;min-height:22px;padding:2px 8px;border-radius:999px;font-size:12px;font-weight:700;border:1px solid transparent;margin:0 4px 4px 0;white-space:nowrap}
.badge.main{background:var(--main);border-color:#b4d2ef}
.badge.util{background:var(--util);border-color:#97d9b1}
.badge.html{background:var(--html);border-color:#c9bee9}
.badge.none{background:#f3f4f6;border-color:#d5d9e0;color:#545f70}
.deps{display:flex;flex-wrap:wrap;gap:4px}
</style>
</head>
<body>
<header>
  <h1>Dochi Script Dependencies</h1>
  <div class="stats">
    <div class="stat"><b id="statMain">0</b><span>main scripts</span></div>
    <div class="stat"><b id="statScript">0</b><span>script links</span></div>
    <div class="stat"><b id="statHtml">0</b><span>html links</span></div>
  </div>
</header>
<main class="wrap">
  <div class="controls">
    <input id="search" type="search" placeholder="Search script or html">
  </div>
  <h2>Main List</h2>
  <table>
    <thead>
      <tr>
        <th>Main Script</th>
        <th>Script Dependencies</th>
        <th>HTML Dependencies</th>
      </tr>
    </thead>
    <tbody id="tbody"></tbody>
  </table>
</main>
<script>
const DATA={"schema":3,"generated_at":"2026-05-11T05:58:50.824Z","detection":"Lists script and HTML dependencies for each main script.","utility_root":"npc_util/common/1.0.0","main_scripts":[{"id":"item_editor","package":"item_editor","script":"dc_item_editor.js","versions":[{"mc_version":"forge_1_20_1","version":"1.0.0","manifest":"item_editor/forge_1_20_1/1.0.0/manifest.json","source_path":"item_editor/forge_1_20_1/1.0.0/dc_item_editor.js"}],"script_dependencies":[],"html_dependencies":[]},{"id":"npc_dialogue","package":"npc_dialogue","script":"dc_dialogue_trigger.js","versions":[{"mc_version":"common","version":"1.0.0","manifest":"npc_dialogue/common/1.0.0/manifest.json","source_path":"npc_dialogue/common/1.0.0/dc_dialogue_trigger.js"}],"script_dependencies":[{"script":"dc_npc_core_module.js","path":"npc_util/common/1.0.0/dc_npc_core_module.js","required":true,"load_order":1},{"script":"dc_cfg_checker.js","path":"npc_util/common/1.0.0/dc_cfg_checker.js","required":true,"load_order":2},{"script":"dc_util_common.js","path":"npc_util/common/1.0.0/dc_util_common.js","required":true,"load_order":3},{"script":"dc_gui_runtime.js","path":"npc_util/common/1.0.0/dc_gui_runtime.js","required":true,"load_order":4},{"script":"dc_cond_checker.js","path":"npc_util/common/1.0.0/dc_cond_checker.js","required":true,"load_order":5},{"script":"dc_reward_checker.js","path":"npc_util/common/1.0.0/dc_reward_checker.js","required":true,"load_order":6},{"script":"dc_dialogue_util.js","path":"npc_util/common/1.0.0/dc_dialogue_util.js","required":true,"load_order":7}],"html_dependencies":[{"path":"html/dc_util/dc_gui_runtime.html","required":true}]},{"id":"npc_editor","package":"npc_editor","script":"dc_npc_editor.js","versions":[{"mc_version":"common","version":"1.0.0","manifest":"npc_editor/common/1.0.0/manifest.json","source_path":"npc_editor/common/1.0.0/dc_npc_editor.js"}],"script_dependencies":[],"html_dependencies":[{"path":"html/dc_npc_editor.html","required":true}]},{"id":"npc_trainer","package":"npc_trainer","script":"dc_npc_trainer.js","versions":[{"mc_version":"fabric_1_21_1","version":"1.0.0","manifest":"npc_trainer/fabric_1_21_1/1.0.0/manifest.json","source_path":"npc_trainer/fabric_1_21_1/1.0.0/dc_npc_trainer.js"}],"script_dependencies":[{"script":"dc_npc_core_module.js","path":"npc_util/common/1.0.0/dc_npc_core_module.js","required":true,"load_order":1},{"script":"dc_cfg_checker.js","path":"npc_util/common/1.0.0/dc_cfg_checker.js","required":true,"load_order":2},{"script":"dc_util_common.js","path":"npc_util/common/1.0.0/dc_util_common.js","required":true,"load_order":3},{"script":"dc_cond_checker.js","path":"npc_util/common/1.0.0/dc_cond_checker.js","required":true,"load_order":4},{"script":"dc_reward_checker.js","path":"npc_util/common/1.0.0/dc_reward_checker.js","required":true,"load_order":5},{"script":"dc_sequence_core.js","path":"npc_util/common/1.0.0/dc_sequence_core.js","required":true,"load_order":6},{"script":"dc_gui_runtime.js","path":"npc_util/common/1.0.0/dc_gui_runtime.js","required":true,"load_order":8},{"script":"dc_dialogue_util.js","path":"npc_util/common/1.0.0/dc_dialogue_util.js","required":true,"load_order":9}],"html_dependencies":[{"path":"html/dc_battle_exclamation.html","required":true},{"path":"html/dc_util/dc_gui_runtime.html","required":true}]}]};
const state={search:""};
function escapeHtml(value){return String(value==null?"":value).replace(/[&<>"']/g,ch=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[ch]))}
function setStats(){
  document.getElementById("statMain").textContent=DATA.main_scripts.length;
  document.getElementById("statScript").textContent=DATA.main_scripts.reduce((sum,item)=>sum+(item.script_dependencies||[]).length,0);
  document.getElementById("statHtml").textContent=DATA.main_scripts.reduce((sum,item)=>sum+(item.html_dependencies||[]).length,0);
}
function filtered(){
  const q=state.search.toLowerCase();
  return DATA.main_scripts.filter(item=>{
    if(!q)return true;
    const text=[item.script,(item.script_dependencies||[]).map(dep=>dep.script).join(" "),(item.html_dependencies||[]).map(dep=>dep.path).join(" ")].join(" ").toLowerCase();
    return text.indexOf(q)!==-1;
  });
}
function badges(items, cls, empty){
  if(!items.length)return '<span class="badge none">'+empty+'</span>';
  return items.map(item=>'<span class="badge '+cls+'">'+escapeHtml(item)+'</span>').join("");
}
function renderTable(items){
  const tbody=document.getElementById("tbody");
  tbody.innerHTML="";
  items.forEach(item=>{
    const scripts=(item.script_dependencies||[]).map(dep=>dep.script);
    const html=(item.html_dependencies||[]).map(dep=>dep.path);
    const tr=document.createElement("tr");
    tr.innerHTML='<td><code>'+escapeHtml(item.script)+'</code></td><td><div class="deps">'+badges(scripts,'util','-')+'</div></td><td><div class="deps">'+badges(html,'html','-')+'</div></td>';
    tbody.appendChild(tr);
  });
}
function render(){renderTable(filtered())}
setStats();render();
document.getElementById("search").addEventListener("input",e=>{state.search=e.target.value;render()});
</script>
</body>
</html>
