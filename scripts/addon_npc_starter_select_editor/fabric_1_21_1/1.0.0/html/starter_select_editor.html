<!doctype html>
<html>
<head>
<meta charset="utf-8">
<style>
:root{
  --bg:rgba(8,12,18,.72);
  --panel:#101722;
  --panel2:#151f2d;
  --line:#2f3d55;
  --text:#eef4ff;
  --muted:#9aa9c2;
  --blue:#5e8cff;
  --green:#4fc48b;
  --red:#ef6b73;
  --warn:#e6b856;
}
*{box-sizing:border-box}
body{
  margin:0;
  min-height:100vh;
  font-family:Arial,Helvetica,sans-serif;
  color:var(--text);
  background:var(--bg);
  overflow:hidden;
}
button,input{
  font-family:inherit;
  font-size:16px;
}
button{
  min-height:42px;
  border:1px solid #40506a;
  border-radius:6px;
  color:var(--text);
  background:#243149;
  padding:0 14px;
  cursor:pointer;
}
button:hover{border-color:#6f8fd2;background:#2c3d5c}
button.primary{background:#315ecb;border-color:#7198ff}
button.good{background:#246b50;border-color:#59d39c}
button.danger{background:#74303a;border-color:#f07b85}
button.ghost{background:#141d2b}
button:disabled{opacity:.45;cursor:default}
input{
  min-height:42px;
  width:100%;
  border:1px solid #3f4d65;
  border-radius:6px;
  color:var(--text);
  background:#0d1420;
  padding:7px 10px;
  outline:none;
}
input:focus{border-color:#6f91ff;box-shadow:0 0 0 2px rgba(94,140,255,.18)}
.shell{
  width:calc(100vw - 24px);
  height:calc(100vh - 24px);
  margin:12px auto;
  display:grid;
  grid-template-rows:auto 1fr auto;
  background:rgba(12,18,28,.94);
  border:1px solid #31405a;
  border-radius:8px;
  box-shadow:0 20px 70px rgba(0,0,0,.5);
  overflow:hidden;
}
.top,.bottom{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:12px;
  padding:14px 16px;
  background:#0d1420;
  border-bottom:1px solid var(--line);
}
.bottom{border-top:1px solid var(--line);border-bottom:0}
.title{font-size:18px;font-weight:800}
.sub{font-size:14px;color:var(--muted);margin-top:4px}
.status{font-size:15px;color:var(--muted)}
.status.ok{color:var(--green)}
.status.err{color:var(--red)}
.content{
  display:grid;
  grid-template-columns:430px 1fr;
  min-height:0;
}
.side{
  display:grid;
  grid-template-rows:auto 1fr auto;
  gap:12px;
  padding:14px;
  border-right:1px solid var(--line);
  background:#0f1724;
  min-height:0;
}
.side-head{display:flex;align-items:center;justify-content:space-between;gap:8px}
.count{color:var(--muted);font-size:12px}
.list{
  overflow:auto;
  display:flex;
  flex-direction:column;
  gap:8px;
  padding-right:2px;
}
.row{
  border:1px solid #2d3a52;
  border-radius:7px;
  background:#121c2b;
  padding:10px;
  cursor:pointer;
}
.row:hover{border-color:#5e79af}
.row.active{border-color:#6f91ff;background:#1a2942}
.row-name{font-weight:800;font-size:14px}
.row-meta{color:var(--muted);font-size:13px;margin-top:4px}
.side-actions{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.editor{
  padding:14px;
  overflow:auto;
}
.section{
  margin-bottom:16px;
  border:1px solid #293750;
  border-radius:8px;
  background:#111a28;
}
.section-title{
  padding:10px 12px;
  border-bottom:1px solid #293750;
  color:#c6d5f0;
  font-size:14px;
  font-weight:800;
  text-transform:uppercase;
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,minmax(220px,560px));
  gap:12px;
  padding:12px;
  justify-content:start;
}
.grid.three{grid-template-columns:360px 128px 220px 220px}
.grid.six{grid-template-columns:repeat(6,minmax(72px,1fr))}
.field.w-title{max-width:520px}
.field.w-subtitle{max-width:620px}
.field.w-claimed{max-width:720px}
.field.w-species{max-width:430px}
.field.w-level{max-width:128px}
.field.w-small{max-width:220px}
.field.w-mid{max-width:300px}
.field.w-wide{max-width:440px}
.field label{
  display:block;
  margin-bottom:5px;
  color:var(--muted);
  font-size:14px;
  font-weight:700;
}
.checkline{
  display:flex;
  align-items:center;
  gap:10px;
  min-height:34px;
}
.checkline input{width:18px;min-height:18px}
.input-pick{
  display:grid;
  grid-template-columns:1fr 46px;
  gap:6px;
}
.input-pick input{min-width:0}
.pick-btn{
  display:flex;
  align-items:center;
  justify-content:center;
  min-width:46px;
  padding:0;
  font-size:13px;
  font-weight:800;
}
.mag-icon{
  display:inline-block;
  width:15px;
  height:15px;
  border:2px solid #d9e4ff;
  border-radius:50%;
  position:relative;
  vertical-align:middle;
}
.mag-icon:after{
  content:"";
  position:absolute;
  width:8px;
  height:2px;
  right:-7px;
  bottom:-4px;
  background:#d9e4ff;
  border-radius:2px;
  transform:rotate(45deg);
}
.picker-pop{
  display:none;
  position:fixed;
  right:34px;
  top:92px;
  width:min(430px,calc(100vw - 68px));
  max-height:calc(100vh - 150px);
  z-index:100;
  border:1px solid #5876ad;
  border-radius:8px;
  background:#0d1420;
  box-shadow:0 24px 70px rgba(0,0,0,.65);
  overflow:hidden;
}
.picker-pop.open{
  display:grid;
  grid-template-rows:auto auto minmax(0,1fr);
}
.picker-head{
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:10px;
  padding:12px;
  border-bottom:1px solid #293750;
  background:#121c2b;
}
.picker-title{font-size:15px;font-weight:800}
.picker-meta{display:block;margin-top:3px;color:var(--muted);font-size:12px}
.picker-search{
  margin:10px 12px;
  width:calc(100% - 24px);
}
.picker-list{
  overflow:auto;
  padding:0 12px 12px;
}
.pick-option{
  width:100%;
  min-height:36px;
  margin-bottom:6px;
  text-align:left;
  background:#121c2b;
}
.pick-option.active{
  border-color:#7ea0ff;
  background:#1a2942;
}
.pick-empty{
  padding:14px;
  color:var(--muted);
  border:1px dashed #3d4c65;
  border-radius:7px;
}
.raw{
  width:100%;
  min-height:92px;
  resize:vertical;
  border:1px solid #3f4d65;
  border-radius:6px;
  color:var(--text);
  background:#0d1420;
  padding:8px 10px;
  font-family:Consolas,monospace;
  font-size:12px;
}
.empty{
  padding:18px;
  color:var(--muted);
  border:1px dashed #3d4c65;
  border-radius:8px;
  text-align:center;
}
@media(max-width:900px){
  .shell{width:calc(100vw - 18px);height:calc(100vh - 18px);margin:9px}
  .content{grid-template-columns:1fr}
  .side{border-right:0;border-bottom:1px solid var(--line);max-height:290px}
  .grid,.grid.three,.grid.six{grid-template-columns:1fr}
  .field.w-title,.field.w-subtitle,.field.w-claimed,.field.w-species,.field.w-level,.field.w-small,.field.w-mid,.field.w-wide{max-width:none}
  .picker-pop{right:12px;top:72px;width:calc(100vw - 24px);max-height:calc(100vh - 110px)}
}
</style>
<script>
var STATE={jsonPath:"",fileName:"",json:null,index:0,locale:"en_us",i18n:{},saveTimer:null}
var NATURES=["","hardy","lonely","brave","adamant","naughty","bold","docile","relaxed","impish","lax","timid","hasty","serious","jolly","naive","modest","mild","quiet","bashful","rash","calm","gentle","sassy","careful","quirky"]
var FALLBACK_POKEMON=["bulbasaur","ivysaur","venusaur","charmander","charmeleon","charizard","squirtle","wartortle","blastoise","pikachu","eevee","chikorita","cyndaquil","totodile","treecko","torchic","mudkip","turtwig","chimchar","piplup","snivy","tepig","oshawott","chespin","fennekin","froakie","rowlet","litten","popplio","grookey","scorbunny","sobble","sprigatito","fuecoco","quaxly","riolu","ralts","gible","bagon","dratini","sylveon"]
var FALLBACK_ABILITIES=["","overgrow","blaze","torrent","shield-dust","shed-skin","compound-eyes","swarm","keen-eye","tangled-feet","static","lightning-rod","run-away","adaptability","anticipation","inner-focus","synchronize","trace","intimidate","levitate","pressure","chlorophyll","solar-power","swift-swim","rain-dish","protean","battle-bond","long-reach","liquid-voice","grassy-surge","libero","sniper","unaware"]
var FALLBACK_FORMS=["","normal","alola","galar","hisui","paldea"]
var POKEMON_OPTIONS=FALLBACK_POKEMON.slice()
var ABILITY_OPTIONS=FALLBACK_ABILITIES.slice()
var MOVE_OPTIONS=["","tackle","growl","scratch","tail-whip","vine-whip","ember","water-gun","razor-leaf","quick-attack","thunder-shock","bubble","pound"]
var GENDER_OPTIONS=["","random","male","female","genderless"]
var PICKER={open:false,kind:"",targetId:"",title:"",titleKey:"",items:[]}

function byId(id){return document.getElementById(id)}
function esc(v){return String(v==null?"":v).replace(/[&<>"']/g,function(c){return({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"})[c]})}
function parsePayload(data){
  if(data&&data.charAt){
    try{return JSON.parse(data)}catch(err){return null}
  }
  return data||null
}
function normalizeLocale(locale){locale=String(locale||"en_us").toLowerCase().replace("-","_");return locale||"en_us"}
function tr(key,fallback,vars){
  var text=STATE.i18n&&STATE.i18n[key]!=null?String(STATE.i18n[key]):String(fallback==null?key:fallback)
  vars=vars||{}
  return text.replace(/\{([A-Za-z0-9_]+)\}/g,function(all,name){return vars[name]!=null?String(vars[name]):all})
}
function setText(id,key,fallback,vars){
  var el=byId(id)
  if(el)el.textContent=tr(key,fallback,vars)
}
function applyI18n(root){
  var nodes,i,el,key,placeholder,title
  root=root||document
  nodes=root.querySelectorAll("[data-i18n],[data-i18n-placeholder],[data-i18n-title]")
  for(i=0;i<nodes.length;i++){
    el=nodes[i]
    key=el.getAttribute("data-i18n")
    if(key)el.textContent=tr(key,el.getAttribute("data-i18n-fallback")||el.textContent)
    placeholder=el.getAttribute("data-i18n-placeholder")
    if(placeholder)el.setAttribute("placeholder",tr(placeholder,el.getAttribute("placeholder")||""))
    title=el.getAttribute("data-i18n-title")
    if(title)el.setAttribute("title",tr(title,el.getAttribute("title")||""))
  }
  if(byId("status")&&!byId("status").textContent) setStatus(tr("starter_editor.ready","Ready"),"")
}
function toInt(v,f){var n=parseInt(String(v),10);return isNaN(n)?f:n}
function cleanToken(v){return String(v||"").replace(/[^A-Za-z0-9_:-]/g,"").toLowerCase()}
function optionalToken(v){var t=cleanToken(v);return t==="default"||t==="none"||t==="-"?"":t}

function cap(v){v=String(v||"");return v?v.charAt(0).toUpperCase()+v.slice(1):v}
function defaultListId(){return cleanToken(String(STATE.fileName||STATE.jsonPath||"starter_list").replace(/\.json$/i,""))||"starter_list"}
function statBlock(){return{hp:0,atk:0,def:0,spatk:0,spdef:0,speed:0}}
function normalizeStats(raw){
  raw=raw&&typeof raw==="object"?raw:{}
  return{hp:Math.max(0,toInt(raw.hp,0)),atk:Math.max(0,toInt(raw.atk,0)),def:Math.max(0,toInt(raw.def,0)),spatk:Math.max(0,toInt(raw.spatk,0)),spdef:Math.max(0,toInt(raw.spdef,0)),speed:Math.max(0,toInt(raw.speed,0))}
}
function normalizeMoves(raw){
  var arr=Array.isArray(raw)?raw:[],out=["","","",""],i
  for(i=0;i<4;i++)out[i]=String(arr[i]||"")
  return out
}
function defaultChoice(){
  return{id:"sylveon",label:"Sylveon",species:"sylveon",pokemon:"sylveon",level:5,gender:"random",nature:"",ability:"",form:"",shiny:false,moveset:["","","",""],ivs:statBlock(),evs:statBlock()}
}
function normalizeChoice(raw){
  var c=raw&&typeof raw==="object"?raw:{},species=cleanToken(c.species||c.pokemon||c.key||c.id||"sylveon")||"sylveon"
  return{id:cleanToken(c.id||species)||species,label:String(c.label||c.name||cap(species)),species:species,pokemon:species,level:Math.max(1,Math.min(100,toInt(c.level||c.lvl,5))),gender:cleanToken(c.gender||""),nature:cleanToken(c.nature||""),ability:String(c.ability||""),form:String(c.form||""),shiny:c.shiny===true,moveset:normalizeMoves(c.moveset||c.moves),ivs:normalizeStats(c.ivs),evs:normalizeStats(c.evs)}
}
function normalizeJson(raw){
  var src=raw&&typeof raw==="object"?raw:{},list=Array.isArray(src.choices)?src.choices:(Array.isArray(src.starters)?src.starters:(Array.isArray(src.pokemon)?src.pokemon:[])),out={choices:[]},i
  out.id=String(src.id||"starter_list")
  out.title=String(src.title||tr("starter_editor.default_title","Choose Your Starter"))
  out.subtitle=String(src.subtitle||"")
  out.once=src.once===true
  out.claimKey=String(src.claimKey||src.id||"starter_list")
  out.commandName="pokegiveother"
  out.alreadyClaimedMessage=String(src.alreadyClaimedMessage||"")
  for(i=0;i<list.length;i++)out.choices.push(normalizeChoice(list[i]))
  if(!out.choices.length)out.choices.push(defaultChoice())
  return out
}
function readInit(){
  var raw=window.cnpc&&window.cnpc.initData?window.cnpc.initData:{}
  try{if(raw&&raw.charAt)raw=JSON.parse(raw)}catch(e){raw={ok:false,error:String(e)}}
  STATE.locale=normalizeLocale(raw.locale||(raw.i18n&&raw.i18n.locale)||"en_us")
  STATE.i18n=(raw.i18n&&raw.i18n.messages)||{}
  STATE.jsonPath=String(raw.jsonPath||"")
  STATE.fileName=String(raw.fileName||STATE.jsonPath||"starter.json")
  STATE.json=normalizeJson(raw.json||{})
}
function sendEvt(name,data){
  try{
    if(window.cnpc&&typeof window.cnpc.sendEvent==="function"){
      window.cnpc.sendEvent(name,data||{})
      return true
    }
  }catch(err){}
  return false
}
function tryClientClose(){
  try{if(window.cnpc&&typeof window.cnpc.close==="function"){window.cnpc.close();return true}}catch(errClose){}
  try{if(window.cnpc&&typeof window.cnpc.closeHtmlGui==="function"){window.cnpc.closeHtmlGui();return true}}catch(err0){}
  try{if(window.cnpc&&typeof window.cnpc.closeGui==="function"){window.cnpc.closeGui();return true}}catch(err1){}
  try{if(window.close){window.close();return true}}catch(err2){}
  return false
}
function setStatus(text,kind){
  var el=byId("status")
  el.className="status "+(kind||"")
  el.textContent=String(text||"")
}
function choices(){if(!STATE.json.choices)STATE.json.choices=[];return STATE.json.choices}
function activeChoice(){
  var list=choices()
  if(!list.length)list.push(defaultChoice())
  if(STATE.index<0)STATE.index=0
  if(STATE.index>=list.length)STATE.index=list.length-1
  return list[STATE.index]
}
function gatherMeta(){
  STATE.json.title=byId("cfgTitle").value
  STATE.json.subtitle=byId("cfgSubtitle").value
  STATE.json.id=STATE.json.id||defaultListId()
  STATE.json.claimKey=STATE.json.claimKey||STATE.json.id
  STATE.json.commandName="pokegiveother"
  STATE.json.once=byId("cfgOnce").checked
  STATE.json.alreadyClaimedMessage=byId("cfgClaimed").value
}
function putStat(prefix,target){
  target.hp=toInt(byId(prefix+"Hp").value,0)
  target.atk=toInt(byId(prefix+"Atk").value,0)
  target.def=toInt(byId(prefix+"Def").value,0)
  target.spatk=toInt(byId(prefix+"Spatk").value,0)
  target.spdef=toInt(byId(prefix+"Spdef").value,0)
  target.speed=toInt(byId(prefix+"Speed").value,0)
}
function gatherChoice(){
  var c=activeChoice()
  c.species=cleanToken(byId("species").value)||"sylveon"
  c.pokemon=c.species
  c.id=c.species
  c.label=cap(c.species)
  c.level=Math.max(1,Math.min(100,toInt(byId("level").value,5)))
  c.gender=optionalToken(byId("gender").value)
  c.nature=optionalToken(byId("nature").value)
  c.ability=optionalText(byId("ability").value)
  c.form=optionalText(byId("form").value)
  c.shiny=byId("shiny").checked
  c.moveset=[byId("move1").value,byId("move2").value,byId("move3").value,byId("move4").value]
  c.ivs=c.ivs||statBlock()
  c.evs=c.evs||statBlock()
  putStat("iv",c.ivs)
  putStat("ev",c.evs)
}
function renderMeta(){
  byId("path").textContent=STATE.jsonPath||STATE.fileName
  byId("cfgTitle").value=STATE.json.title||""
  byId("cfgSubtitle").value=STATE.json.subtitle||""
  byId("cfgOnce").checked=STATE.json.once===true
  byId("cfgClaimed").value=STATE.json.alreadyClaimedMessage||""
}
function setStats(prefix,stats){
  stats=normalizeStats(stats)
  byId(prefix+"Hp").value=stats.hp
  byId(prefix+"Atk").value=stats.atk
  byId(prefix+"Def").value=stats.def
  byId(prefix+"Spatk").value=stats.spatk
  byId(prefix+"Spdef").value=stats.spdef
  byId(prefix+"Speed").value=stats.speed
}
function renderChoice(){
  var c=activeChoice(),moves=normalizeMoves(c.moveset)
  byId("species").value=c.species||""
  byId("level").value=c.level||5
  byId("gender").value=c.gender||""
  byId("nature").value=c.nature||""
  byId("ability").value=c.ability||""
  byId("form").value=c.form||""
  byId("shiny").checked=c.shiny===true
  byId("move1").value=moves[0]
  byId("move2").value=moves[1]
  byId("move3").value=moves[2]
  byId("move4").value=moves[3]
  setStats("iv",c.ivs)
  setStats("ev",c.evs)
}
function renderList(){
  var box=byId("list"),list=choices(),i,c,row
  box.innerHTML=""
  byId("count").textContent=tr("starter_editor.choices_count","{count} choices",{count:list.length})
  if(!list.length){box.innerHTML='<div class="empty">'+esc(tr("starter_editor.no_pokemon","No Pokemon configured."))+'</div>';return}
  for(i=0;i<list.length;i++){
    c=list[i]
    row=document.createElement("div")
    row.className="row"+(i===STATE.index?" active":"")
    row.setAttribute("data-index",String(i))
    row.innerHTML='<div class="row-name">'+esc(cap(c.species||"pokemon"))+'</div>'
    row.onclick=function(){gatherMeta();gatherChoice();STATE.index=Number(this.getAttribute("data-index"));renderAll()}
    box.appendChild(row)
  }
}
function hasParent(node,parent){
  while(node){
    if(node===parent)return true
    node=node.parentNode
  }
  return false
}
function isPickerButton(node){
  while(node&&node!==document.body){
    if(node.getAttribute&&node.getAttribute("data-picker-button")==="1")return true
    node=node.parentNode
  }
  return false
}
function uniqueList(items){
  var out=[],seen={},i,v,key
  for(i=0;i<items.length;i++){
    v=String(items[i]==null?"":items[i])
    key=v.toLowerCase()
    if(seen[key])continue
    seen[key]=true
    out.push(v)
  }
  return out
}
function currentValue(id){
  var el=byId(id)
  return el?String(el.value||""):""
}
function allMoveValues(){
  var out=[],list=choices(),i,j,moves
  for(i=0;i<list.length;i++){
    moves=normalizeMoves(list[i].moveset)
    for(j=0;j<moves.length;j++)out.push(moves[j])
  }
  return out
}
function optionLabel(v){
  return String(v||tr("starter_editor.default","Default"))
}
function optionsForKind(kind,targetId){
  var list=[],current=currentValue(targetId),i
  if(kind==="species"){
    list=POKEMON_OPTIONS.slice()
    for(i=0;i<choices().length;i++)list.push(choices()[i].species||"")
  }else if(kind==="gender"){
    list=GENDER_OPTIONS.slice()
  }else if(kind==="nature"){
    list=NATURES.slice()
  }else if(kind==="ability"){
    list=ABILITY_OPTIONS.slice()
    for(i=0;i<choices().length;i++)list.push(choices()[i].ability||"")
  }else if(kind==="form"){
    list=FALLBACK_FORMS.slice()
    for(i=0;i<choices().length;i++)list.push(choices()[i].form||"")
  }else if(kind==="move"){
    list=MOVE_OPTIONS.concat(allMoveValues())
  }
  list.push(current)
  return uniqueList(list)
}
function matchesPickerQuery(value,query){
  var text=String(value||"Default").toLowerCase()
  query=String(query||"").toLowerCase()
  return !query||text.indexOf(query)>=0
}
function assignPickerChoice(btn,value){
  btn.onclick=function(e){
    if(e&&e.stopPropagation)e.stopPropagation()
    choosePickerValue(value)
  }
}
function renderPicker(){
  var fly=byId("pickerFlyout"),listEl=byId("pickerList"),search=byId("pickerSearch"),q,i,v,btn,count,shown,max
  if(!fly||!listEl)return
  byId("pickerTitle").textContent=tr(PICKER.titleKey,PICKER.title||"Select")
  byId("pickerMeta").textContent=currentValue(PICKER.targetId)?tr("starter_editor.picker_current","Current: {value}",{value:currentValue(PICKER.targetId)}):tr("starter_editor.picker_direct","Direct input is also available.")
  q=search?search.value:""
  listEl.innerHTML=""
  count=0
  shown=0
  max=180
  for(i=0;i<PICKER.items.length;i++){
    v=PICKER.items[i]
    if(!matchesPickerQuery(v,q))continue
    count++
    if(shown>=max)continue
    btn=document.createElement("button")
    btn.type="button"
    btn.className="pick-option"+(String(v)===currentValue(PICKER.targetId)?" active":"")
    btn.textContent=optionLabel(v)
    assignPickerChoice(btn,v)
    listEl.appendChild(btn)
    shown++
  }
  if(!count){
    listEl.innerHTML='<div class="pick-empty">'+esc(tr("starter_editor.picker_no_match","No matching option."))+'</div>'
  }else if(count>max){
    btn=document.createElement("div")
    btn.className="pick-empty"
    btn.textContent=tr("starter_editor.picker_more","{count} more results. Type to narrow the list.",{count:count-max})
    listEl.appendChild(btn)
  }
}
function openPicker(kind,targetId,title,titleKey){
  var fly=byId("pickerFlyout"),search=byId("pickerSearch")
  PICKER.open=true
  PICKER.kind=kind
  PICKER.targetId=targetId
  PICKER.title=title
  PICKER.titleKey=titleKey||""
  PICKER.items=optionsForKind(kind,targetId)
  if(search)search.value=""
  fly.className="picker-pop open"
  renderPicker()
  window.setTimeout(function(){if(search)search.focus()},0)
}
function closePicker(){
  var fly=byId("pickerFlyout")
  PICKER.open=false
  PICKER.kind=""
  PICKER.targetId=""
  PICKER.title=""
  PICKER.titleKey=""
  PICKER.items=[]
  if(fly)fly.className="picker-pop"
}
function refreshPicker(){
  if(!PICKER.open)return
  PICKER.items=optionsForKind(PICKER.kind,PICKER.targetId)
  renderPicker()
}
function choosePickerValue(value){
  var targetId=PICKER.targetId,el=byId(targetId)
  if(el)el.value=String(value||"")
  closePicker()
  if(targetId==="species"){
    gatherChoice()
    renderList()
    renderChoice()
  }
}
function bindPickers(){
  var buttons=document.getElementsByTagName("button"),i,b
  for(i=0;i<buttons.length;i++){
    b=buttons[i]
    if(b.getAttribute("data-picker-button")!=="1")continue
    b.onclick=function(e){
      if(e&&e.stopPropagation)e.stopPropagation()
      openPicker(this.getAttribute("data-kind"),this.getAttribute("data-target"),this.getAttribute("data-title"),this.getAttribute("data-title-key"))
    }
  }
  byId("pickerCloseBtn").onclick=function(e){
    if(e&&e.stopPropagation)e.stopPropagation()
    closePicker()
  }
  byId("pickerSearch").oninput=renderPicker
  document.addEventListener("click",function(e){
    if(!PICKER.open)return
    if(hasParent(e.target,byId("pickerFlyout")))return
    if(isPickerButton(e.target))return
    closePicker()
  })
  document.addEventListener("keydown",function(e){
    if(e&&e.keyCode===27)closePicker()
  })
}
function loadRemoteOptions(){
  if(!window.fetch)return
  fetch("https://pokeapi.co/api/v2/pokemon?limit=1025").then(function(r){return r.json()}).then(function(data){
    if(data&&data.results)POKEMON_OPTIONS=data.results.map(function(p){return p.name})
    refreshPicker()
  }).catch(function(){})
  fetch("https://pokeapi.co/api/v2/ability?limit=400").then(function(r){return r.json()}).then(function(data){
    if(data&&data.results)ABILITY_OPTIONS=[""].concat(data.results.map(function(p){return p.name}))
    refreshPicker()
  }).catch(function(){})
  fetch("https://pokeapi.co/api/v2/move?limit=1000").then(function(r){return r.json()}).then(function(data){
    if(data&&data.results)MOVE_OPTIONS=[""].concat(data.results.map(function(p){return p.name}))
    refreshPicker()
  }).catch(function(){})
}
function renderAll(){closePicker();renderMeta();renderList();renderChoice()}
function addChoice(){
  gatherMeta();gatherChoice()
  choices().push(defaultChoice())
  STATE.index=choices().length-1
  renderAll()
  setStatus(tr("starter_editor.added","Added Pokemon."),"ok")
}
function duplicateChoice(){
  gatherMeta();gatherChoice()
  var copy=JSON.parse(JSON.stringify(activeChoice()))
  copy.id=cleanToken(copy.id+"_copy")
  choices().splice(STATE.index+1,0,copy)
  STATE.index=STATE.index+1
  renderAll()
  setStatus(tr("starter_editor.duplicated","Duplicated Pokemon."),"ok")
}
function removeChoice(){
  var list=choices()
  if(list.length<=1){setStatus(tr("starter_editor.one_required","At least one Pokemon is required."),"err");return}
  list.splice(STATE.index,1)
  STATE.index=Math.max(0,Math.min(STATE.index,list.length-1))
  renderAll()
  setStatus(tr("starter_editor.removed","Removed Pokemon."),"ok")
}
function save(){
  gatherMeta();gatherChoice()
  STATE.json=normalizeJson(STATE.json)
  if(STATE.saveTimer)window.clearTimeout(STATE.saveTimer)
  if(!sendEvt("starterEditorSave",{json:STATE.json})){
    setStatus(tr("starter_editor.save_failed","Save failed."),"err")
    return
  }
  setStatus(tr("starter_editor.saving","Saving..."),"")
  STATE.saveTimer=window.setTimeout(function(){
    setStatus(tr("starter_editor.save_timeout","Save response timed out. Check player chat or script log."),"err")
  },5000)
}
function back(){
  setStatus(tr("starter_editor.closing","Closing..."),"")
  sendEvt("starterEditorBack",{})
  window.setTimeout(tryClientClose,500)
}
function closeEditor(){
  setStatus(tr("starter_editor.closing","Closing..."),"")
  sendEvt("starterEditorClose",{})
  window.setTimeout(tryClientClose,250)
}
function receiveState(data){
  data=parsePayload(data)
  if(data&&data.json){
    STATE.locale=normalizeLocale(data.locale||(data.i18n&&data.i18n.locale)||STATE.locale)
    STATE.i18n=(data.i18n&&data.i18n.messages)||STATE.i18n||{}
    STATE.jsonPath=String(data.jsonPath||STATE.jsonPath)
    STATE.fileName=String(data.fileName||STATE.fileName)
    STATE.json=normalizeJson(data.json)
    STATE.index=Math.min(STATE.index,choices().length-1)
    applyI18n(document)
    renderAll()
  }
}
function receiveResult(data){
  data=parsePayload(data)
  data=data||{}
  if(STATE.saveTimer){window.clearTimeout(STATE.saveTimer);STATE.saveTimer=null}
  if(data.ok){
    if(data.action==="save"&&data.path)setStatus(tr("starter_editor.saved_path","Saved {path}",{path:data.path}),"ok")
    else setStatus(data.message||tr("starter_editor.saved","Saved."),"ok")
  }else setStatus(data.error||tr("starter_editor.save_failed","Save failed."),"err")
}
window.onload=function(){
  readInit()
  applyI18n(document)
  renderAll()
  byId("addBtn").onclick=addChoice
  byId("dupBtn").onclick=duplicateChoice
  byId("removeBtn").onclick=removeChoice
  byId("saveBtn").onclick=save
  byId("backBtn").onclick=back
  byId("closeBtn").onclick=closeEditor
  bindPickers()
  if(window.cnpc&&typeof window.cnpc.onEvent==="function"){
    window.cnpc.onEvent("starterEditorState",receiveState)
    window.cnpc.onEvent("starterEditorResult",receiveResult)
  }
  sendEvt("starterEditorReady",{})
  loadRemoteOptions()
}
</script>
</head>
<body>
<div class="shell">
  <div class="top">
    <div>
      <div class="title" data-i18n="starter_editor.title">Starter Pokemon Editor</div>
      <div class="sub" id="path"></div>
    </div>
    <div class="status" id="status" data-i18n="starter_editor.ready">Ready</div>
  </div>
  <div class="content">
    <aside class="side">
      <div class="side-head">
        <div class="title" style="font-size:15px" data-i18n="starter_editor.pokemon">Pokemon</div>
        <div class="count" id="count"></div>
      </div>
      <div class="list" id="list"></div>
      <div class="side-actions">
        <button id="addBtn" class="good" data-i18n="starter_editor.add">Add</button>
        <button id="dupBtn" data-i18n="starter_editor.duplicate">Duplicate</button>
        <button id="removeBtn" class="danger" data-i18n="starter_editor.remove">Remove</button>
      </div>
    </aside>
    <main class="editor">
      <section class="section">
        <div class="section-title" data-i18n="starter_editor.list_settings">List Settings</div>
        <div class="grid">
          <div class="field w-title"><label data-i18n="starter_editor.title_field">Title</label><input id="cfgTitle"></div>
          <div class="field w-subtitle"><label data-i18n="starter_editor.subtitle">Subtitle</label><input id="cfgSubtitle"></div>
          <div class="field w-small"><label data-i18n="starter_editor.once_per_player">Once Per Player</label><div class="checkline"><input id="cfgOnce" type="checkbox"><span data-i18n="starter_editor.enable_once">Enable one-time claim</span></div></div>
          <div class="field w-claimed" style="grid-column:1/-1"><label data-i18n="starter_editor.already_claimed">Already Claimed Message</label><input id="cfgClaimed"></div>
        </div>
      </section>
      <section class="section">
        <div class="section-title" data-i18n="starter_editor.selected_pokemon">Selected Pokemon</div>
        <div class="grid three">
          <div class="field w-species"><label data-i18n="starter_editor.species">Species</label><div class="input-pick"><input id="species" placeholder="bulbasaur"><button type="button" class="pick-btn" data-picker-button="1" data-kind="species" data-target="species" data-title="Species" data-title-key="starter_editor.species" title="Search species" data-i18n-title="starter_editor.search_species"><span class="mag-icon"></span></button></div></div>
          <div class="field w-level"><label data-i18n="starter_editor.level">Level</label><input id="level" type="number" min="1" max="100"></div>
          <div class="field w-small"><label data-i18n="starter_editor.gender">Gender</label><div class="input-pick"><input id="gender" placeholder="Default" data-i18n-placeholder="starter_editor.default"><button type="button" class="pick-btn" data-picker-button="1" data-kind="gender" data-target="gender" data-title="Gender" data-title-key="starter_editor.gender" title="Search gender" data-i18n-title="starter_editor.search_gender"><span class="mag-icon"></span></button></div></div>
          <div class="field w-small"><label data-i18n="starter_editor.shiny">Shiny</label><div class="checkline"><input id="shiny" type="checkbox"><span data-i18n="starter_editor.shiny_pokemon">Shiny Pokemon</span></div></div>
          <div class="field w-small"><label data-i18n="starter_editor.nature">Nature</label><div class="input-pick"><input id="nature" placeholder="Default" data-i18n-placeholder="starter_editor.default"><button type="button" class="pick-btn" data-picker-button="1" data-kind="nature" data-target="nature" data-title="Nature" data-title-key="starter_editor.nature" title="Search nature" data-i18n-title="starter_editor.search_nature"><span class="mag-icon"></span></button></div></div>
          <div class="field w-mid"><label data-i18n="starter_editor.ability">Ability</label><div class="input-pick"><input id="ability" placeholder="Default" data-i18n-placeholder="starter_editor.default"><button type="button" class="pick-btn" data-picker-button="1" data-kind="ability" data-target="ability" data-title="Ability" data-title-key="starter_editor.ability" title="Search ability" data-i18n-title="starter_editor.search_ability"><span class="mag-icon"></span></button></div></div>
          <div class="field w-small"><label data-i18n="starter_editor.form">Form</label><div class="input-pick"><input id="form" placeholder="Default" data-i18n-placeholder="starter_editor.default"><button type="button" class="pick-btn" data-picker-button="1" data-kind="form" data-target="form" data-title="Form" data-title-key="starter_editor.form" title="Search form" data-i18n-title="starter_editor.search_form"><span class="mag-icon"></span></button></div></div>
        </div>
      </section>
      <section class="section">
        <div class="section-title" data-i18n="starter_editor.moves">Moves</div>
        <div class="grid">
          <div class="field w-wide"><label data-i18n="starter_editor.move_1">Move 1</label><div class="input-pick"><input id="move1"><button type="button" class="pick-btn" data-picker-button="1" data-kind="move" data-target="move1" data-title="Move 1" data-title-key="starter_editor.move_1" title="Search move" data-i18n-title="starter_editor.search_move"><span class="mag-icon"></span></button></div></div>
          <div class="field w-wide"><label data-i18n="starter_editor.move_2">Move 2</label><div class="input-pick"><input id="move2"><button type="button" class="pick-btn" data-picker-button="1" data-kind="move" data-target="move2" data-title="Move 2" data-title-key="starter_editor.move_2" title="Search move" data-i18n-title="starter_editor.search_move"><span class="mag-icon"></span></button></div></div>
          <div class="field w-wide"><label data-i18n="starter_editor.move_3">Move 3</label><div class="input-pick"><input id="move3"><button type="button" class="pick-btn" data-picker-button="1" data-kind="move" data-target="move3" data-title="Move 3" data-title-key="starter_editor.move_3" title="Search move" data-i18n-title="starter_editor.search_move"><span class="mag-icon"></span></button></div></div>
          <div class="field w-wide"><label data-i18n="starter_editor.move_4">Move 4</label><div class="input-pick"><input id="move4"><button type="button" class="pick-btn" data-picker-button="1" data-kind="move" data-target="move4" data-title="Move 4" data-title-key="starter_editor.move_4" title="Search move" data-i18n-title="starter_editor.search_move"><span class="mag-icon"></span></button></div></div>
        </div>
      </section>
      <section class="section">
        <div class="section-title" data-i18n="starter_editor.ivs">IVs</div>
        <div class="grid six">
          <div class="field"><label data-i18n="starter_editor.hp">HP</label><input id="ivHp" type="number" min="0" max="31"></div>
          <div class="field"><label data-i18n="starter_editor.atk">Atk</label><input id="ivAtk" type="number" min="0" max="31"></div>
          <div class="field"><label data-i18n="starter_editor.def">Def</label><input id="ivDef" type="number" min="0" max="31"></div>
          <div class="field"><label data-i18n="starter_editor.spatk">Sp.Atk</label><input id="ivSpatk" type="number" min="0" max="31"></div>
          <div class="field"><label data-i18n="starter_editor.spdef">Sp.Def</label><input id="ivSpdef" type="number" min="0" max="31"></div>
          <div class="field"><label data-i18n="starter_editor.speed">Speed</label><input id="ivSpeed" type="number" min="0" max="31"></div>
        </div>
      </section>
      <section class="section">
        <div class="section-title" data-i18n="starter_editor.evs">EVs</div>
        <div class="grid six">
          <div class="field"><label data-i18n="starter_editor.hp">HP</label><input id="evHp" type="number" min="0" max="252"></div>
          <div class="field"><label data-i18n="starter_editor.atk">Atk</label><input id="evAtk" type="number" min="0" max="252"></div>
          <div class="field"><label data-i18n="starter_editor.def">Def</label><input id="evDef" type="number" min="0" max="252"></div>
          <div class="field"><label data-i18n="starter_editor.spatk">Sp.Atk</label><input id="evSpatk" type="number" min="0" max="252"></div>
          <div class="field"><label data-i18n="starter_editor.spdef">Sp.Def</label><input id="evSpdef" type="number" min="0" max="252"></div>
          <div class="field"><label data-i18n="starter_editor.speed">Speed</label><input id="evSpeed" type="number" min="0" max="252"></div>
        </div>
      </section>
    </main>
  </div>
  <div class="bottom">
    <button id="closeBtn" class="ghost" data-i18n="starter_editor.close">Close</button>
    <div>
      <button id="backBtn" data-i18n="starter_editor.npc_editor">NPC Editor</button>
      <button id="saveBtn" class="primary" data-i18n="starter_editor.save">Save</button>
    </div>
  </div>
</div>
<div class="picker-pop" id="pickerFlyout">
  <div class="picker-head">
    <div>
      <div class="picker-title" id="pickerTitle" data-i18n="starter_editor.select">Select</div>
      <span class="picker-meta" id="pickerMeta"></span>
    </div>
    <button type="button" class="ghost" id="pickerCloseBtn" data-i18n="starter_editor.close">Close</button>
  </div>
  <input class="picker-search" id="pickerSearch" placeholder="Search or type directly in the field" data-i18n-placeholder="starter_editor.picker_search_placeholder">
  <div class="picker-list" id="pickerList"></div>
</div>
</body>
</html>
