<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
*{box-sizing:border-box}
:root{--mainColor:#ff6a00}
body{margin:0;overflow:hidden;font-family:Segoe UI,Arial,sans-serif;background:transparent;color:#fff}
#frame{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:min(980px,82vw);
height:min(680px,78vh);
border-radius:24px;
overflow:hidden;
background:
linear-gradient(to bottom,rgba(229,57,53,.84) 0 48%,rgba(32,34,38,.92) 48% 52%,rgba(255,255,255,.88) 52% 100%);
box-shadow:0 20px 80px rgba(0,0,0,.45),0 0 40px var(--mainColor);
}
#frame:before{
content:"";
position:absolute;
inset:0;
background:radial-gradient(circle at 50% 50%,rgba(255,255,255,.88) 0 58px,#202226 59px 75px,transparent 76px);
opacity:.88;
pointer-events:none;
}
#card{
position:relative;
z-index:2;
height:100%;
padding:26px;
display:flex;
flex-direction:column;
gap:18px;
background:rgba(10,13,18,.22);
backdrop-filter:blur(8px);
}
#head{display:flex;align-items:flex-end;justify-content:space-between;gap:20px}
#title{font-size:34px;font-weight:900;letter-spacing:0;text-shadow:0 0 18px var(--mainColor)}
#subtitle{font-size:14px;color:rgba(255,255,255,.82);margin-top:6px}
#claimHint{font-size:12px;color:rgba(255,255,255,.72);text-align:right}
#choices{
display:grid;
grid-template-columns:repeat(3,minmax(0,1fr));
gap:16px;
overflow:hidden;
padding:4px;
}
.choice{
min-height:348px;
border:1px solid rgba(255,255,255,.24);
border-radius:18px;
background:linear-gradient(180deg,rgba(255,255,255,.18),rgba(16,20,28,.72));
box-shadow:0 12px 34px rgba(0,0,0,.28);
display:flex;
flex-direction:column;
align-items:center;
justify-content:flex-start;
padding:16px 14px 18px;
cursor:pointer;
transition:transform .16s ease,border-color .16s ease,box-shadow .16s ease;
}
.choice:hover,.choice.active{
transform:translateY(-4px);
border-color:var(--mainColor);
box-shadow:0 16px 42px rgba(0,0,0,.36),0 0 26px var(--mainColor);
}
.model{
position:relative;
width:166px;
height:198px;
flex:0 0 198px;
border-radius:22px;
background:radial-gradient(circle,rgba(255,255,255,.32),rgba(255,255,255,.1) 48%,rgba(0,0,0,.2));
border:1px solid rgba(255,255,255,.25);
overflow:hidden;
}
.model:after{
content:"";
position:absolute;
inset:-60%;
background:linear-gradient(120deg,transparent 35%,rgba(255,255,255,.38),transparent 65%);
animation:shine 3.2s linear infinite;
}
@keyframes shine{0%{transform:translateX(-60%) rotate(20deg)}100%{transform:translateX(60%) rotate(20deg)}}
.name{margin-top:16px;font-size:20px;font-weight:900;line-height:1.08;text-align:center;text-transform:uppercase;word-break:break-word}
.meta{margin-top:7px;font-size:13px;color:rgba(255,255,255,.82)}
.types{margin-top:12px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center}
.type{
padding:4px 8px;
border-radius:999px;
font-size:11px;
font-weight:800;
text-transform:uppercase;
background:rgba(255,255,255,.18);
border:1px solid rgba(255,255,255,.2);
}
.details{margin-top:11px;display:flex;gap:6px;flex-wrap:wrap;justify-content:center;color:rgba(255,255,255,.74);font-size:11px;line-height:1.25}
.empty{margin:auto;color:rgba(255,255,255,.8);font-weight:700}
#pager{
display:none;
align-items:center;
justify-content:center;
gap:12px;
height:38px;
flex:0 0 38px;
}
#pager.active{display:flex}
.pageBtn{
min-width:44px;
height:30px;
border:1px solid rgba(255,255,255,.24);
border-radius:10px;
background:rgba(18,22,30,.72);
color:#fff;
font-size:18px;
font-weight:900;
cursor:pointer;
}
.pageBtn:disabled{
opacity:.38;
cursor:default;
}
#pageInfo{
min-width:72px;
text-align:center;
font-size:12px;
font-weight:800;
color:rgba(255,255,255,.78);
}
#confirmBox{
position:absolute;
left:50%;
bottom:24px;
transform:translate(-50%,20px) scale(.96);
width:min(480px,calc(100% - 42px));
padding:18px;
border-radius:18px;
background:rgba(18,22,30,.92);
border:1px solid rgba(255,255,255,.22);
box-shadow:0 16px 46px rgba(0,0,0,.4);
opacity:0;
pointer-events:none;
transition:.18s ease;
z-index:20;
text-align:center;
}
#confirmBox.active{opacity:1;pointer-events:auto;transform:translate(-50%,0) scale(1)}
#confirmText{font-size:16px;font-weight:800}
.btnrow{margin-top:14px;display:flex;gap:10px;justify-content:center}
.confirmBtn{
min-width:96px;
height:38px;
border:1px solid rgba(255,255,255,.22);
border-radius:12px;
background:var(--mainColor);
color:#fff;
font-weight:900;
cursor:pointer;
}
.confirmBtn.secondary{background:#2c323d}
.spark{
position:absolute;
width:10px;
height:10px;
border-radius:50%;
background:var(--mainColor);
opacity:.75;
animation:rise 1s linear forwards;
pointer-events:none;
}
@keyframes rise{0%{opacity:.75;transform:translateY(0) scale(1)}100%{opacity:0;transform:translateY(-120px) scale(.2)}}
</style>

<script>
var TYPE_COLOR={
normal:"#A8A77A",fire:"#EE8130",water:"#6390F0",electric:"#F7D02C",grass:"#7AC74C",ice:"#96D9D6",
fighting:"#C22E28",poison:"#A33EA1",ground:"#E2BF65",flying:"#A98FF3",psychic:"#F95587",bug:"#A6B91A",
rock:"#B6A136",ghost:"#735797",dragon:"#6F35FC",dark:"#705746",steel:"#B7B7CE",fairy:"#D685AD"
}
var OVERLAY_NAME="starter_selection"
var TITLE="Choose Your Starter"
var SUBTITLE=""
var CHOICES=[]
var SELECTED=null
var SELECTED_INDEX=-1
var PAGE_SIZE=3
var PAGE=0
var MAIN_COLOR="#ff6a00"

function esc(v){
return String(v==null?"":v).replace(/[&<>"']/g,function(ch){return {"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[ch]})
}
function cap(v){
var s=String(v||"")
return s?s.charAt(0).toUpperCase()+s.slice(1):""
}
function normalizeChoice(raw,idx){
var c=raw&&typeof raw==="object"?raw:{species:raw}
var species=String(c.species||c.pokemon||c.id||"sylveon").toLowerCase()
return {
id:String(c.id||species||("starter_"+idx)),
species:species,
pokemon:species,
label:String(c.label||c.name||species),
level:Number(c.level||c.lvl||5)||5,
gender:String(c.gender||""),
nature:String(c.nature||""),
ability:String(c.ability||""),
shiny:c.shiny===true||String(c.shiny||"").toLowerCase()==="true",
type1:String(c.type1||(c.types&&c.types[0])||""),
type2:String(c.type2||(c.types&&c.types[1])||"")
}
}
function readInitData(){
var data={}
if(window.cnpc&&window.cnpc.initData){
data=window.cnpc.initData
try{if(typeof data==="string")data=JSON.parse(data)}catch(e){data={}}
}
if(data.overlayName)OVERLAY_NAME=data.overlayName
if(data.title)TITLE=String(data.title)
if(data.subtitle)SUBTITLE=String(data.subtitle)
var list=Array.isArray(data.choices)?data.choices:[]
if(!list.length&&data.pokemon)list=[data]
if(!list.length)list=[{species:"sylveon",level:5,type1:"fairy"}]
CHOICES=[]
for(var i=0;i<list.length;i++)CHOICES.push(normalizeChoice(list[i],i))
}
function choiceColor(choice){
return TYPE_COLOR[String(choice.type1||"").toLowerCase()]||"#ff6a00"
}
function detailText(choice){
var out=[]
if(choice.gender)out.push("Gender "+choice.gender)
if(choice.nature)out.push("Nature "+choice.nature)
if(choice.ability)out.push("Ability "+choice.ability)
if(choice.shiny)out.push("Shiny")
return out
}
function renderChoices(){
var box=document.getElementById("choices")
var start=PAGE*PAGE_SIZE
var end=Math.min(start+PAGE_SIZE,CHOICES.length)
box.innerHTML=""
if(!CHOICES.length){
box.innerHTML='<div class="empty">No starters configured.</div>'
updatePager()
return
}
if(start>=CHOICES.length){
PAGE=Math.max(0,Math.ceil(CHOICES.length/PAGE_SIZE)-1)
start=PAGE*PAGE_SIZE
end=Math.min(start+PAGE_SIZE,CHOICES.length)
}
for(var i=start;i<end;i++){
var c=CHOICES[i]
var row=document.createElement("div")
var details=detailText(c)
row.className="choice"+(i===SELECTED_INDEX?" active":"")
row.setAttribute("data-index",String(i))
row.onclick=function(){
selectChoice(Number(this.getAttribute("data-index")))
}
row.innerHTML=
'<div class="model" data-mc-slot="'+i+'" data-mc-scale="4.8"></div>'+
'<div class="name">'+esc(c.label)+'</div>'+
'<div class="meta">Lv. '+esc(c.level)+'</div>'+
'<div class="types">'+
(c.type1?'<span class="type" style="background:'+esc(choiceColor(c))+'">'+esc(c.type1)+'</span>':"")+
(c.type2?'<span class="type" style="background:'+esc(TYPE_COLOR[String(c.type2).toLowerCase()]||"#666")+'">'+esc(c.type2)+'</span>':"")+
'</div>'+
'<div class="details">'+details.map(function(v){return '<span>'+esc(v)+'</span>'}).join("")+'</div>'
box.appendChild(row)
}
updatePager()
}
function updatePager(){
var pager=document.getElementById("pager")
var prev=document.getElementById("pagePrev")
var next=document.getElementById("pageNext")
var info=document.getElementById("pageInfo")
var count=Math.max(1,Math.ceil(CHOICES.length/PAGE_SIZE))
if(!pager)return
if(CHOICES.length<=PAGE_SIZE){
pager.className=""
return
}
pager.className="active"
prev.disabled=PAGE<=0
next.disabled=PAGE>=count-1
info.innerText=String(PAGE+1)+" / "+String(count)
}
function setPage(delta){
var count=Math.max(1,Math.ceil(CHOICES.length/PAGE_SIZE))
PAGE=Math.max(0,Math.min(count-1,PAGE+delta))
document.getElementById("confirmBox").classList.remove("active")
renderChoices()
}
function getPayload(){
var c=SELECTED||CHOICES[0]||normalizeChoice({},0)
return {overlayName:OVERLAY_NAME,choiceId:c.id,pokemon:c.species,species:c.species,level:c.level,lvl:c.level,choice:c}
}
function sendCnpcEvent(name){
if(window.cnpc&&typeof window.cnpc.sendEvent==="function")window.cnpc.sendEvent(name,getPayload())
}
function closeCnpc(){
if(window.cnpc&&typeof window.cnpc.close==="function")window.cnpc.close()
}
function playCry(choice){
SELECTED=choice||SELECTED||CHOICES[0]
sendCnpcEvent("pokeCry")
}
function selectChoice(index){
SELECTED=CHOICES[index]||CHOICES[0]
SELECTED_INDEX=index
MAIN_COLOR=choiceColor(SELECTED)
document.documentElement.style.setProperty("--mainColor",MAIN_COLOR)
var cards=document.querySelectorAll(".choice")
for(var i=0;i<cards.length;i++)cards[i].classList.toggle("active",Number(cards[i].getAttribute("data-index"))===index)
playCry(SELECTED)
document.getElementById("confirmText").innerText="Choose "+cap(SELECTED.label)+" as your starter?"
document.getElementById("confirmBox").classList.add("active")
}
function confirmYes(){
sendCnpcEvent("select")
closeCnpc()
}
function confirmNo(){
document.getElementById("confirmBox").classList.remove("active")
sendCnpcEvent("cancel")
}
function spawnSpark(){
var f=document.createElement("div")
f.className="spark"
f.style.left=(window.innerWidth/2+(Math.random()*500-250))+"px"
f.style.top=(window.innerHeight/2+220)+"px"
document.body.appendChild(f)
setTimeout(function(){if(f&&f.parentNode)f.parentNode.removeChild(f)},1000)
}
window.onload=function(){
readInitData()
document.getElementById("title").innerText=TITLE
document.getElementById("subtitle").innerText=SUBTITLE
renderChoices()
if(CHOICES.length){
MAIN_COLOR=choiceColor(CHOICES[0])
document.documentElement.style.setProperty("--mainColor",MAIN_COLOR)
}
setInterval(spawnSpark,120)
}
</script>
</head>

<body>
<div id="frame">
<div id="card">
<div id="head">
<div>
<div id="title">Choose Your Starter</div>
<div id="subtitle"></div>
</div>
<div id="claimHint">Starter selection</div>
</div>
<div id="choices"></div>
<div id="pager">
<button id="pagePrev" class="pageBtn" onclick="setPage(-1)">&lt;</button>
<div id="pageInfo">1 / 1</div>
<button id="pageNext" class="pageBtn" onclick="setPage(1)">&gt;</button>
</div>
</div>
<div id="confirmBox">
<div id="confirmText">Choose this Pokemon?</div>
<div class="btnrow">
<button class="confirmBtn" onclick="confirmYes()">Choose</button>
<button class="confirmBtn secondary" onclick="confirmNo()">Cancel</button>
</div>
</div>
</div>
</body>
</html>
