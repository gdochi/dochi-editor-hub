<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
body{margin:0;overflow:hidden;font-family:Segoe UI;background:transparent}

#frame{
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:55vw;
height:70vh;
border-radius:32px;
padding:10px;
overflow:hidden;
}

/* 🔥 외곽선 전용 레이어 (핵심) */
#frame .borderGlow{
position:absolute;
inset:0;
border-radius:32px;
pointer-events:none;
z-index:50;

/* 🔥 여기 수정 */
border:4px solid var(--mainColor);

box-shadow:
0 0 15px var(--mainColor),
0 0 30px var(--mainColor),
0 0 60px var(--mainColor);

animation:softFlow 3s ease-in-out infinite;
}

/* 🔥 살짝 흐르는 느낌 */
@keyframes softFlow{
0%,100%{
box-shadow:
0 0 8px var(--mainColor),
0 0 16px var(--mainColor);
transform:translate(0,0);
opacity:.9;
}
50%{
box-shadow:
0 0 20px var(--mainColor),
0 0 40px var(--mainColor),
0 0 80px var(--mainColor);
transform:translate(0.5px,-0.5px);
opacity:1;
}
}

/* 몬스터볼 배경 */
#frame::before{
content:"";
position:absolute;
inset:0;
background:
linear-gradient(to bottom,#e53935 50%,#fff 50%),
linear-gradient(#222,#222);
background-size:100% 100%,100% 12px;
background-position:center,center;
background-repeat:no-repeat;
filter:blur(10px) brightness(.7);
z-index:0;
}

/* 중앙 버튼 */
#frame::after{
content:"";
position:absolute;
top:50%;
left:50%;
transform:translate(-50%,-50%);
width:140px;
height:140px;
border-radius:50%;
background:#fff;
border:16px solid #222;
z-index:1;
box-shadow:0 0 40px rgba(0,0,0,.6);
}

#card{
position:relative;
width:100%;
height:100%;
background:rgba(255,255,255,.08);
backdrop-filter:blur(12px);
border-radius:28px;
display:flex;
flex-direction:column;
align-items:center;
justify-content:center;
z-index:2;
}

.icon{
position:relative;
width:420px;
height:420px;
display:flex;
justify-content:center;
align-items:center;
border-radius:28px;
background:rgba(241,237,237,.15);
backdrop-filter:blur(12px);
border:1px solid rgba(255,255,255,.4);
box-shadow:
0 10px 40px rgba(0,0,0,.2),
inset 0 0 20px rgba(255,255,255,.6),
0 0 40px var(--mainColor);
overflow:hidden;
transform:scale(0);
}

.icon.spawn{
animation:pokemonPop .5s cubic-bezier(.2,1.6,.4,1) forwards;
}

@keyframes pokemonPop{
0%{transform:scale(0) translateY(60px)}
60%{transform:scale(1.2) translateY(-20px)}
100%{transform:scale(1) translateY(0)}
}

.shine{
position:absolute;
top:-50%;
left:-50%;
width:200%;
height:200%;
background:linear-gradient(120deg,transparent 30%,rgba(255,255,255,.6),transparent 70%);
transform:rotate(25deg);
animation:shineMove 3s linear infinite;
}

@keyframes shineMove{
0%{transform:translateX(-100%) rotate(25deg)}
100%{transform:translateX(100%) rotate(25deg)}
}

#name{
margin-top:24px;
font-size:42px;
font-weight:900;
letter-spacing:5px;
cursor:pointer;
color:#fff;
text-shadow:
0 0 10px var(--mainColor),
0 0 25px var(--mainColor);

opacity:0;
transform:translateY(20px);
}

#name.show{
animation:namePop .5s ease forwards;
}

@keyframes namePop{
0%{opacity:0;transform:translateY(20px)}
100%{opacity:1;transform:translateY(0)}
}

#confirmBox{
position:absolute;
top:78%;
left:50%;
transform:translate(-50%,0) scale(.9);
width:380px;
padding:20px;
border-radius:16px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(10px);
border:1px solid rgba(255,255,255,.3);
color:#fff;
text-align:center;
opacity:0;
pointer-events:none;
transition:.25s;
z-index:9999;
}

#confirmBox.active{
opacity:1;
transform:translate(-50%,0) scale(1);
pointer-events:auto;
}

.confirmBtn{
margin-top:14px;
padding:10px 18px;
border:none;
border-radius:10px;
background:var(--mainColor);
color:#fff;
cursor:pointer;
margin-right:8px;
}

.fire{
position:absolute;
width:12px;
height:12px;
background:var(--mainColor);
border-radius:50%;
opacity:.8;
animation:rise 1s linear forwards;
}

@keyframes rise{
0%{opacity:.8;transform:translateY(0)}
100%{opacity:0;transform:translateY(-180px)}
}

#ball{
position:absolute;
width:140px;
height:140px;
border-radius:50%;
overflow:hidden;
z-index:5;
animation:ballDrop .6s ease-out forwards;
}

.ballTop{
position:absolute;
width:100%;
height:50%;
background:#e53935;
top:0;
}

.ballBottom{
position:absolute;
width:100%;
height:50%;
background:#fff;
bottom:0;
}

@keyframes ballDrop{
0%{transform:translateY(-200px) scale(.6)}
60%{transform:translateY(20px) scale(1)}
100%{transform:translateY(0)}
}

.open .ballTop{animation:openTop .4s forwards}
.open .ballBottom{animation:openBottom .4s forwards}

@keyframes openTop{
to{transform:translateY(-70px);opacity:0}
}

@keyframes openBottom{
to{transform:translateY(70px);opacity:0}
}

.flash{
position:absolute;
width:200px;
height:200px;
border-radius:50%;
background:#fff;
opacity:0;
z-index:4;
}

.flash.active{
animation:flashBoom .3s forwards;
}

@keyframes flashBoom{
0%{opacity:1;transform:scale(0)}
100%{opacity:0;transform:scale(2)}
}
</style>

<script>
var TYPE_COLOR={
  normal:"#A8A77A",
  fire:"#EE8130",
  water:"#6390F0",
  electric:"#F7D02C",
  grass:"#7AC74C",
  ice:"#96D9D6",
  fighting:"#C22E28",
  poison:"#A33EA1",
  ground:"#E2BF65",
  flying:"#A98FF3",
  psychic:"#F95587",
  bug:"#A6B91A",
  rock:"#B6A136",
  ghost:"#735797",
  dragon:"#6F35FC",
  dark:"#705746",
  steel:"#B7B7CE",
  fairy:"#D685AD"
}
var POKE_NAME="Charmander",TYPE_NAME="Fire-type Pokemon",MAIN_COLOR="#ff6a00"

var LEVEL=5,OVERLAY_NAME="starter_selection"
TYPE_NAME="Fire-type Pokemon"

function getPayload(){
return {overlayName:OVERLAY_NAME,pokemon:String(POKE_NAME||"").toLowerCase(),level:LEVEL,lvl:LEVEL}
}
function sendCnpcEvent(name){
if(window.cnpc&&typeof window.cnpc.sendEvent==="function")window.cnpc.sendEvent(name,getPayload())
}
function closeCnpc(){
if(window.cnpc&&typeof window.cnpc.close==="function")window.cnpc.close()
}

function askConfirm(){
document.getElementById("confirmText").innerText="Do you want to choose "+POKE_NAME+", the "+TYPE_NAME+"?"
document.getElementById("confirmBox").classList.add("active")
}
function playCry(){
sendCnpcEvent("pokeCry")
}
function confirmYes(){
sendCnpcEvent("select")
closeCnpc()
}
function confirmNo(){
document.getElementById("confirmBox").classList.remove("active")
closeCnpc()
}

function spawnFire(){
var f=document.createElement("div")
f.className="fire"
var cx=window.innerWidth/2
var cy=window.innerHeight/2
f.style.left=(cx+(Math.random()*220-110))+"px"
f.style.top=(cy+160)+"px"
document.body.appendChild(f)
setTimeout(function(){
if(f&&f.parentNode)f.parentNode.removeChild(f)
},1000)
}
setInterval(spawnFire,80)

window.onload=function(){
if(window.cnpc&&window.cnpc.initData){
var data=window.cnpc.initData
try{if(typeof data==="string")data=JSON.parse(data)}catch(e){}
if(data.overlayName)OVERLAY_NAME=data.overlayName
if(data.pokemon)POKE_NAME=data.pokemon
if(data.level!=null)LEVEL=Number(data.level)||LEVEL
else if(data.lvl!=null)LEVEL=Number(data.lvl)||LEVEL
if(data.type1){TYPE_NAME=data.type1+"-type Pokemon";MAIN_COLOR=TYPE_COLOR[data.type1]||"#ff6a00"}
document.documentElement.style.setProperty('--mainColor',MAIN_COLOR)
document.getElementById("name").innerText=POKE_NAME.toUpperCase()
}

setTimeout(function(){
  document.getElementById("ball").classList.add("open")
  document.getElementById("flash").classList.add("active")
  setTimeout(function(){
    document.querySelector(".icon").classList.add("spawn")
    document.getElementById("name").classList.add("show")
    askConfirm()
  },80)

},250)
}
</script>
</head>

<body>
<div id="frame">

<div class="borderGlow"></div>

<div id="card">
<div class="icon" data-mc-slot="0" data-mc-scale="6.2">
<div id="flash" class="flash"></div>
<div id="ball">
<div class="ballTop"></div>
<div class="ballBottom"></div>
</div>
<div class="shine"></div>
</div>
<div id="name" onclick="playCry()">CHARMANDER</div>
</div>
<div id="confirmBox">
<div id="confirmText">Do you want to choose Charmander?</div>
<div>
<button class="confirmBtn" onclick="confirmYes()">Yes</button>
<button class="confirmBtn" onclick="confirmNo()">No</button>
</div>
</div>

</div>
</body>
</html>
