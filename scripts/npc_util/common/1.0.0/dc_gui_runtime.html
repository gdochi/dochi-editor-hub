<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <style>
    :root{
      --stage-w:1280;
      --stage-h:720;
      --ui-scale:1;
      --gui-font-family:Segoe UI, Arial, sans-serif;
    }
    html,body{width:100%;height:100%}
    body{margin:0;overflow:hidden;background:transparent;font-family:var(--gui-font-family)}
    button,input,select,textarea{font-family:inherit}
    #viewport{position:fixed;inset:0;display:block;overflow:hidden}
    #stageWrap{width:calc(var(--stage-w) * 1px);height:calc(var(--stage-h) * 1px);position:absolute;left:0;top:0;transform:none;transform-origin:top left}
    #stageBg{position:absolute;inset:0;background:#000;overflow:hidden}
    #stageBg::before{content:"";position:absolute;inset:0;background:var(--bg-overlay, transparent);opacity:var(--bg-overlay-opacity, 0);pointer-events:none}
    #stageBgImg{position:absolute;inset:0;background-repeat:no-repeat;background-position:center;background-size:cover;opacity:var(--bg-img-opacity, 1);filter:blur(var(--bg-blur, 0px));transform:scale(1.03)}
    #stage{position:absolute;inset:0}

    /* Prevent invisible element boxes from eating clicks. Enable pointer events only for interactive widgets. */
    .el{position:absolute;box-sizing:border-box;border-radius:14px;background:transparent;border:0;pointer-events:none}

    .dialog{pointer-events:none}
    .dialogOverlay{position:absolute;z-index:1;display:flex;flex-direction:column;gap:10px;justify-content:flex-start;align-items:stretch}
    .dialog .speaker{font-weight:900;letter-spacing:.5px;color:rgba(255,255,255,.92);text-shadow:0 2px 10px rgba(0,0,0,.35)}
    .dialog .lines{color:rgba(255,255,255,.9);line-height:1.35;white-space:pre-wrap;word-break:keep-all}

    .choiceBox{position:absolute;inset:0;overflow:visible}
    .choiceBtn{
      pointer-events:auto;
      touch-action: manipulation;
      user-select:none;
      position:static;
      padding:10px 14px;
      border-radius:14px;
      border:1px solid rgba(97,218,251,.18);
      background:linear-gradient(180deg, rgba(255,255,255,.08), rgba(255,255,255,.04));
      box-shadow:
        inset 0 0 0 1px rgba(255,255,255,.04),
        0 8px 18px rgba(0,0,0,.18);
      color:#dbe8f6;
      font-weight:700;
      font-size:13px;
      cursor:pointer;
      display:flex;
      align-items:center;
      justify-content:flex-start;
      text-align:left;
      overflow:hidden;
      white-space:nowrap;
      text-overflow:ellipsis;
      box-sizing:border-box;    }
    .choiceBtn.choiceTextFit{white-space:normal;text-overflow:clip;overflow-wrap:anywhere;word-break:normal;line-height:1.18}
    .choiceBtn:active{transform:translateY(1px)}
    .quantityInput{
      cursor:text;
      user-select:text;
      text-align:center;
      font-weight:800;
      outline:none;
    }
    .choiceItemWrap{
      position:absolute;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:flex-start;
      overflow:visible;
      box-sizing:border-box;
      pointer-events:none;
    }
    .choiceItemWrap .choiceBtn{pointer-events:auto}
    .itemSlotButton{
      position:relative;
      justify-content:center !important;
      padding:0;
      white-space:normal;
    }
    .itemSlotRenderer{
      position:absolute;
      pointer-events:none;
    }
    .itemSlotCurrencyRenderer{
      position:relative;
      top:2px;
      display:inline-block;
      flex:0 0 auto;
      pointer-events:none;
    }
    .itemSlotFallback{
      width:58%;
      aspect-ratio:1;
      border-radius:2px;
      background:
        linear-gradient(135deg, rgba(238,247,255,.9), rgba(127,190,255,.46) 46%, rgba(56,87,140,.28) 47%, rgba(16,26,42,.72));
      box-shadow:inset 0 0 0 1px rgba(255,255,255,.22), 0 8px 18px rgba(0,0,0,.24);
    }
    .itemSlotPrice{
      width:100%;
      color:rgba(190,214,248,.94);
      font-weight:800;
      line-height:1.2;
      text-align:center;
      overflow:visible;
      white-space:nowrap;
      text-overflow:clip;
      text-shadow:0 2px 8px rgba(0,0,0,.36);
      pointer-events:none;
    }

    .mediaImg{position:absolute;inset:0;background-repeat:no-repeat;background-position:center;background-size:contain}
    #stageBgImg,.mediaImg,.choiceBtn,.pageBtn{image-rendering:pixelated;image-rendering:crisp-edges}
    .entitySlot{position:absolute;left:50%;bottom:0;transform:translateX(-50%)}

    .dialogIndicator{
      position:absolute;
      right:12px;
      bottom:10px;
      color:rgba(255,255,255,.9);
      text-shadow:0 2px 10px rgba(0,0,0,.35);
      opacity:1;
      animation:dcDialogCursorBlink var(--cursor-speed, .8s) steps(1) infinite;
      user-select:none;
      pointer-events:none;
    }
    .dialogIndicator.hidden{display:none}
    .dialogIndicator.cursor-symbol{font-weight:900;letter-spacing:.5px}
    .dialogIndicator.cursor-bar{width:10px;height:18px;border-right:2px solid rgba(255,255,255,.9)}
    .dialogIndicator.cursor-block{width:10px;height:18px;background:rgba(255,255,255,.9)}
    .dialogIndicator.cursor-underscore{width:16px;height:3px;background:rgba(255,255,255,.9);margin-bottom:2px}
    .pageNav{position:absolute;z-index:3;display:flex;align-items:center;gap:8px;pointer-events:auto}
    .pageBtn{min-width:40px;min-height:30px;border-radius:10px;border:1px solid rgba(255,255,255,0.16);background:rgba(10,14,22,0.75);color:#eef2ff;font-weight:900;cursor:pointer;display:flex;align-items:center;justify-content:center;padding:0 10px}
    .pageBtn:disabled{opacity:.35;cursor:default}
    .pageCounter{min-width:64px;text-align:center;color:rgba(255,255,255,.86);font-weight:800;text-shadow:0 2px 10px rgba(0,0,0,.35);user-select:none}
    .pagerWrap{position:absolute;inset:0;display:flex;align-items:center;justify-content:center;pointer-events:auto}
    .pagerWrap .pageNav{position:relative;left:auto;top:auto;right:auto;bottom:auto}

    @keyframes dcDialogCursorBlink{
      0%,49%{opacity:1}
      50%,100%{opacity:0}
    }
  </style>
</head>
<body>
  <div id="viewport">
    <div id="stageWrap">
      <div id="stageBg">
        <div id="stageBgImg"></div>
      </div>
      <div id="stage"></div>
    </div>
  </div>

  <script>
  (function(){
    let INIT = (window.cnpc && window.cnpc.initData) ? window.cnpc.initData : {};
    let GUI = INIT && INIT.gui ? INIT.gui : {};
    let BIND = INIT && INIT.bindings ? INIT.bindings : {};

    const DEBUG = (INIT && (INIT.debug === true || INIT.debug === 1 || String(INIT.debug || '').trim() === '1')) || (/[?&]debug=1/.test(String(location.search || '')));
    const DCLOG = (...args) => { if(DEBUG) console.log('[dc_gui_runtime]', ...args); };
    const DCWARN = (...args) => { if(DEBUG) console.warn('[dc_gui_runtime]', ...args); };
    const DCERR = (...args) => { console.error('[dc_gui_runtime]', ...args); };

    let runtimeTimers = [];
    let HAS_PAGER = false;
    function clearRuntimeTimers(){
      for(let i=0;i<runtimeTimers.length;i++){
        try{ clearTimeout(runtimeTimers[i]); }catch{}
      }
      runtimeTimers = [];
    }

    function isNoneColorValue(value){
      return value === null || value === undefined || String(value).trim() === "" || String(value).trim().toLowerCase() === "none";
    }

    window.addEventListener('error', (ev) => {
      try{ DCERR('window.error', { message: ev.message, file: ev.filename, line: ev.lineno, col: ev.colno, error: String(ev.error || '') }); }catch{}
    });
    window.addEventListener('unhandledrejection', (ev) => {
      try{ DCERR('unhandledrejection', String(ev && ev.reason || '')); }catch{}
    });

    try{
      DCLOG('boot', {
        hasCnpc: !!window.cnpc,
        initKeys: INIT ? Object.keys(INIT) : [],
        guiKeys: GUI ? Object.keys(GUI) : [],
        elementCount: Array.isArray(GUI && GUI.elements) ? GUI.elements.length : 0,
        entitySlotKeys: INIT && INIT.entitySlots ? Object.keys(INIT.entitySlots) : [],
        overlayEntities: Array.isArray(INIT && INIT.overlayEntities) ? INIT.overlayEntities.length : 0
      });
    }catch(err){ DCERR('boot log failed', String(err)); }

    function assetUrl(path){
      let raw = String(path || "").trim();
      if(!raw) return "";
      if(/^(?:https?|file|data|cnpc):\/\//i.test(raw)) return raw;
      raw = raw.replace(/\\/g, "/");
      if(raw.charAt(0) === "/") raw = raw.slice(1);
      const base = (window.cnpc && window.cnpc.assetUrl) ? window.cnpc.assetUrl : "cnpc://";
      return base + raw;
    }

    function getFontFormatByPath(path){
      const ext = String(path || "").split(".").pop().toLowerCase();
      return ({ woff:"woff", woff2:"woff2" })[ext] || "";
    }

    function quoteFontFamily(name){
      const raw = String(name || "").trim();
      if(!raw) return "";
      if(/^['"].*['"]$/.test(raw)) return raw;
      if(/^[a-zA-Z_][a-zA-Z0-9_-]*$/.test(raw)) return raw;
      return '"' + raw.replace(/\\/g, "\\\\").replace(/"/g, '\\"') + '"';
    }

    function normalizeGuiFontConfig(){
      const raw = GUI && GUI.font && typeof GUI.font === "object" ? GUI.font : {};
      const source = String(raw.source || raw.mode || "default").trim().toLowerCase();
      const path = String(raw.path || raw.assetPath || "").trim().replace(/\\/g, "/").replace(/^\/+/, "");
      return {
        source: source === "system" || source === "asset-loader" ? source : "default",
        family: source === "system" ? String(raw.family || "").trim() : "",
        path,
        format: String(raw.format || getFontFormatByPath(path)).trim()
      };
    }

    let guiFontStyleNode = null;
    function applyGuiFont(){
      const font = normalizeGuiFontConfig();
      if(font.source === "asset-loader" && font.path){
        if(guiFontStyleNode) guiFontStyleNode.textContent = "";
        const family = ensureRuntimeFontFace(font.path, font.format);
        if(family){
          document.documentElement.style.setProperty("--gui-font-family", family + ", Segoe UI, Arial, sans-serif");
          return;
        }
      }
      if(guiFontStyleNode) guiFontStyleNode.textContent = "";
      if(font.source === "system" && font.family){
        document.documentElement.style.setProperty("--gui-font-family", quoteFontFamily(font.family) + ", Segoe UI, Arial, sans-serif");
      }else{
        document.documentElement.style.setProperty("--gui-font-family", "Segoe UI, Arial, sans-serif");
      }
    }

    const runtimeFontFaceCache = {};
    function fontKeyFromPath(path){
      let clean = String(path || "").trim().replace(/\\/g, "/").replace(/^\/+/, "");
      if(!clean) return "";
      let hash = 0;
      for(let i=0;i<clean.length;i++) hash = ((hash << 5) - hash + clean.charCodeAt(i)) | 0;
      return "dochi_font_" + Math.abs(hash);
    }

    function ensureRuntimeFontFace(path, explicitFormat){
      const clean = String(path || "").trim().replace(/\\/g, "/").replace(/^\/+/, "");
      if(!clean) return "";
      const format = String(explicitFormat || getFontFormatByPath(clean)).trim();
      if(!format) return "";
      const family = fontKeyFromPath(clean);
      if(runtimeFontFaceCache[clean]) return runtimeFontFaceCache[clean];
      const node = document.createElement("style");
      node.dataset.dochiRuntimeFont = family;
      node.textContent = '@font-face{font-family:' + quoteFontFamily(family) + ';src:url("' + assetUrl(clean).replace(/"/g, '\\"') + '") format("' + format.replace(/"/g, '\\"') + '");font-display:swap;}';
      document.head.appendChild(node);
      runtimeFontFaceCache[clean] = quoteFontFamily(family);
      return runtimeFontFaceCache[clean];
    }

    function isDefaultFontValue(value){
      const raw = String(value || "").trim().toLowerCase();
      return !raw || raw === "inherit" || raw === "default" || raw === "none";
    }

    function normalizeFontPathValue(value){
      return String(value || "").trim().replace(/\\/g, "/").replace(/^\/+/, "");
    }

    function pickFontValue(){
      for(let i = 0; i < arguments.length; i++){
        const value = String(arguments[i] || "").trim();
        if(value) return value;
      }
      return "";
    }

    function resolveFontFamilyFromPathOrFamily(path, family, format){
      const cleanPath = normalizeFontPathValue(path);
      if(cleanPath) return ensureRuntimeFontFace(cleanPath, format || getFontFormatByPath(cleanPath));
      const cleanFamily = String(family || "").trim();
      if(!isDefaultFontValue(cleanFamily)) return quoteFontFamily(cleanFamily);
      return "";
    }

    function resolveFontFamilyConfig(raw){
      if(!raw) return "";
      if(typeof raw === "object"){
        const source = String(raw.source || raw.mode || "").trim().toLowerCase();
        const path = normalizeFontPathValue(raw.path || raw.assetPath || raw.fontPath);
        if(path && (source === "asset-loader" || source === "asset_loader" || source === "asset" || !source)){
          return ensureRuntimeFontFace(path, String(raw.format || getFontFormatByPath(path)).trim());
        }
        const family = String(raw.family || raw.fontFamily || raw.name || "").trim();
        if(!isDefaultFontValue(family)) return quoteFontFamily(family);
        return "";
      }
      return resolveFontFamilyFromPathOrFamily("", raw, "");
    }

    function resolveElementFontFamily(item){
      if(!item || typeof item !== "object") return "";
      const objectFont = resolveFontFamilyConfig(item.font || item.fontConfig || item.textFontConfig);
      if(objectFont) return objectFont;
      const path = pickFontValue(item.fontPath, item.textFontPath, item.componentFontPath);
      const family = pickFontValue(item.fontFamily, item.textFont, item.componentFont);
      return resolveFontFamilyFromPathOrFamily(path, family, getFontFormatByPath(path));
    }

    function resolveDialogFontFamily(item){
      const path = pickFontValue(item && item.dialogTextFontPath);
      const family = pickFontValue(item && item.dialogTextFont);
      return resolveFontFamilyFromPathOrFamily(path, family, getFontFormatByPath(path)) || resolveElementFontFamily(item);
    }

    function resolveChoiceFontFamily(item){
      const path = pickFontValue(item && item.choiceBtnFontPath, item && item.choiceTextFontPath);
      const family = pickFontValue(item && item.choiceBtnFont, item && item.choiceTextFont);
      return resolveFontFamilyFromPathOrFamily(path, family, getFontFormatByPath(path)) || resolveElementFontFamily(item);
    }

    function clamp(n, a, b){
      const v = Number(n);
      if(Number.isNaN(v)) return a;
      return Math.max(a, Math.min(b, v));
    }


    function applyAlphaToColor(color, alphaMul){
      try{
        var s = String(color == null ? '' : color).trim();
        var mul = Number(alphaMul);
        if(!isFinite(mul)) mul = 1;
        mul = Math.max(0, Math.min(1, mul));
        if(!s) return s;
        var low = s.toLowerCase();
        if(low === 'transparent' || low === 'none') return 'transparent';

        var m = s.match(/^rgba?\(\s*([0-9.]+)\s*,\s*([0-9.]+)\s*,\s*([0-9.]+)\s*(?:,\s*([0-9.]+)\s*)?\)$/i);
        if(m){
          var r = Math.max(0, Math.min(255, Math.round(parseFloat(m[1]) || 0)));
          var g = Math.max(0, Math.min(255, Math.round(parseFloat(m[2]) || 0)));
          var b = Math.max(0, Math.min(255, Math.round(parseFloat(m[3]) || 0)));
          var a = (m[4] == null) ? 1 : (parseFloat(m[4]) || 0);
          a = Math.max(0, Math.min(1, a * mul));
          return 'rgba(' + r + ',' + g + ',' + b + ',' + a + ')';
        }

        var hex = s.match(/^#([0-9a-f]{3,4}|[0-9a-f]{6}|[0-9a-f]{8})$/i);
        if(hex){
          var h = hex[1];
          var r2, g2, b2, a2;
          if(h.length === 3 || h.length === 4){
            r2 = parseInt(h.charAt(0) + h.charAt(0), 16);
            g2 = parseInt(h.charAt(1) + h.charAt(1), 16);
            b2 = parseInt(h.charAt(2) + h.charAt(2), 16);
            a2 = (h.length === 4) ? (parseInt(h.charAt(3) + h.charAt(3), 16) / 255) : 1;
          }else{
            r2 = parseInt(h.slice(0,2), 16);
            g2 = parseInt(h.slice(2,4), 16);
            b2 = parseInt(h.slice(4,6), 16);
            a2 = (h.length === 8) ? (parseInt(h.slice(6,8), 16) / 255) : 1;
          }
          a2 = Math.max(0, Math.min(1, a2 * mul));
          return 'rgba(' + r2 + ',' + g2 + ',' + b2 + ',' + a2 + ')';
        }
      }catch(e){}
      return String(color == null ? '' : color);
    }
    function getBaseResolution(){
      const w = Number(GUI?.stage?.baseResolution?.width || GUI?.stage?.width || 1280) || 1280;
      const h = Number(GUI?.stage?.baseResolution?.height || GUI?.stage?.height || 720) || 720;
      return { w: Math.max(160, w), h: Math.max(90, h) };
    }

    function getViewportSize(base){
      const screen = INIT && INIT.clientScreen && typeof INIT.clientScreen === "object" ? INIT.clientScreen : null;
      const sw = screen ? Number(screen.screenWidth || screen.width || 0) : 0;
      const sh = screen ? Number(screen.screenHeight || screen.height || 0) : 0;
      const ww = Number(window.innerWidth || document.documentElement.clientWidth || 0);
      const wh = Number(window.innerHeight || document.documentElement.clientHeight || 0);
      return {
        w: Math.max(160, Math.floor(sw || ww || base.w)),
        h: Math.max(90, Math.floor(sh || wh || base.h))
      };
    }

    function setScale(){
      const { w: bw, h: bh } = getBaseResolution();
      const actual = getViewportSize({ w:bw, h:bh });
      const s = Math.min(actual.w / bw, actual.h / bh);
      const scale = Math.max(0.25, Math.min(3, s));
      const stageW = Math.round(bw * scale);
      const stageH = Math.round(bh * scale);
      document.documentElement.style.setProperty("--stage-w", String(stageW));
      document.documentElement.style.setProperty("--stage-h", String(stageH));
      document.documentElement.style.setProperty("--stage-scale", "1");
      document.documentElement.style.setProperty("--ui-scale", String(scale));
      const wrap = document.getElementById("stageWrap");
      if(wrap){
        wrap.style.left = `${Math.max(0, Math.round((actual.w - stageW) / 2))}px`;
        wrap.style.top = `${Math.max(0, Math.round((actual.h - stageH) / 2))}px`;
      }
    }
    function readImageCrop(source, prefix){
      const src = source && typeof source === "object" ? source : {};
      const direct = src[String(prefix || "image") + "Crop"];
      if(!direct || typeof direct !== "object") return null;
      const x = Math.max(0, Number(direct.x || 0) || 0);
      const y = Math.max(0, Number(direct.y || 0) || 0);
      const w = Math.max(0, Number(direct.w || 0) || 0);
      const h = Math.max(0, Number(direct.h || 0) || 0);
      if(direct.enabled === false || w <= 0 || h <= 0) return null;
      return { x:x, y:y, w:w, h:h, sourceW:Math.max(0, Number(direct.sourceW || 0) || 0), sourceH:Math.max(0, Number(direct.sourceH || 0) || 0) };
    }

    function applyCropBackground(node, path, crop, options){
      const opts = options && typeof options === "object" ? options : {};
      node.style.backgroundImage = path ? `url("${assetUrl(path)}")` : "none";
      if(!path){
        node.style.backgroundSize = "contain";
        node.style.backgroundPosition = "center";
        return;
      }
      node.style.backgroundRepeat = "no-repeat";
      const applyWithSize = function(sourceW, sourceH){
        const box = node.getBoundingClientRect();
        const insetX = Math.max(0, Number(opts.insetX || 0));
        const scale = Math.max(0.01, Number(opts.scale || 100) / 100);
        const offsetX = Number(opts.offsetX || 0);
        const offsetY = Number(opts.offsetY || 0);
        const rawW = node.clientWidth || node.offsetWidth || box.width || sourceW || 1;
        const rawH = node.clientHeight || node.offsetHeight || box.height || sourceH || 1;
        const bw = Math.max(1, rawW - insetX * 2);
        const bh = Math.max(1, rawH);
        const baseW = crop ? Math.max(1, crop.w) : Math.max(1, sourceW || bw);
        const baseH = crop ? Math.max(1, crop.h) : Math.max(1, sourceH || bh);
        const s = Math.min(bw / baseW, bh / baseH) * scale;
        const drawW = Math.max(1, Math.round((sourceW || baseW) * s));
        const drawH = Math.max(1, Math.round((sourceH || baseH) * s));
        node.style.backgroundSize = `${drawW}px ${drawH}px`;
        const cropX = crop ? crop.x : 0;
        const cropY = crop ? crop.y : 0;
        const viewW = Math.max(1, Math.round(baseW * s));
        const viewH = Math.max(1, Math.round(baseH * s));
        const left = insetX + ((bw - viewW) / 2) + offsetX - cropX * s;
        const top = ((bh - viewH) / 2) + offsetY - cropY * s;
        node.style.backgroundPosition = `${Math.round(left)}px ${Math.round(top)}px`;
      };
      if(crop && crop.sourceW > 0 && crop.sourceH > 0) applyWithSize(crop.sourceW, crop.sourceH);
      else {
        const img = new Image();
        img.onload = function(){ applyWithSize(img.naturalWidth || (crop && crop.w) || 1, img.naturalHeight || (crop && crop.h) || 1); };
        img.src = assetUrl(path);
      }
    }
    function textureRuntimePath(owner, imageKey, pathKey){
      if(!owner || typeof owner !== "object") return "";
      return String(owner[pathKey] || owner[imageKey] || "").trim().replace(/\\/g, "/").replace(/^\/+/, "");
    }

    function normalizeTextureCrop(raw){
      if(!raw || typeof raw !== "object") return null;
      const w = Math.max(0, Number(raw.w || 0) || 0);
      const h = Math.max(0, Number(raw.h || 0) || 0);
      if(raw.enabled === false || w <= 0 || h <= 0) return null;
      return {
        x:Math.max(0, Number(raw.x || 0) || 0),
        y:Math.max(0, Number(raw.y || 0) || 0),
        w:w,
        h:h,
        sourceW:Math.max(0, Number(raw.sourceW || 0) || 0),
        sourceH:Math.max(0, Number(raw.sourceH || 0) || 0)
      };
    }

    function cropPercent(value, total){
      if(!(total > 0)) return 0;
      return Math.max(0, Math.min(100, (value / total) * 100));
    }

    function applyTextureBackground(node, path, crop){
      const clean = String(path || "").trim().replace(/\\/g, "/").replace(/^\/+/, "");
      if(!node || !clean) return false;
      node.style.backgroundImage = 'url("' + assetUrl(clean).replace(/"/g, '\\"') + '")';
      node.style.backgroundRepeat = "no-repeat";
      node.style.backgroundPosition = "center";
      node.style.backgroundSize = "100% 100%";
      node.style.backgroundColor = "transparent";
      node.style.imageRendering = "pixelated";
      if(crop && crop.w > 0 && crop.h > 0 && crop.sourceW > 0 && crop.sourceH > 0){
        node.style.backgroundSize = String((crop.sourceW / crop.w) * 100) + "% " + String((crop.sourceH / crop.h) * 100) + "%";
        node.style.backgroundPosition = String(cropPercent(crop.x, crop.sourceW - crop.w)) + "% " + String(cropPercent(crop.y, crop.sourceH - crop.h)) + "%";
      }
      return true;
    }

    function stripButtonChromeForTexture(btn){
      if(!btn) return;
      btn.style.borderStyle = "none";
      btn.style.borderWidth = "0px";
      btn.style.borderColor = "transparent";
      btn.style.boxShadow = "none";
    }

    function byZThenIndex(a, b){
      const za = a && a.z != null ? Number(a.z) : 0;
      const zb = b && b.z != null ? Number(b.z) : 0;
      if(za !== zb) return za - zb;
      const ia = a && a.__index != null ? Number(a.__index) : 0;
      const ib = b && b.__index != null ? Number(b.__index) : 0;
      return ia - ib;
    }

    function esc(s){
      return String(s == null ? "" : s).replace(/[&<>"]/g, c => ({ "&":"&amp;", "<":"&lt;", ">":"&gt;", "\"":"&quot;" }[c]));
    }

    function mcText(s){
      const raw = String(s == null ? "" : s);
      const colors = {0:"#000000",1:"#0000AA",2:"#00AA00",3:"#00AAAA",4:"#AA0000",5:"#AA00AA",6:"#FFAA00",7:"#AAAAAA",8:"#555555",9:"#5555FF",a:"#55FF55",b:"#55FFFF",c:"#FF5555",d:"#FF55FF",e:"#FFFF55",f:"#FFFFFF"};
      let out = "", buf = "";
      let state = {color:"",bold:false,italic:false,underline:false,strike:false};
      function style(){
        const st = [];
        if(state.color) st.push("color:"+state.color);
        if(state.bold) st.push("font-weight:700");
        if(state.italic) st.push("font-style:italic");
        if(state.underline && state.strike) st.push("text-decoration:underline line-through");
        else if(state.underline) st.push("text-decoration:underline");
        else if(state.strike) st.push("text-decoration:line-through");
        return st.join(";");
      }
      function flush(){
        if(!buf) return;
        const st = style();
        const txt = esc(buf);
        out += st ? '<span style="'+st+'">'+txt+'</span>' : txt;
        buf = "";
      }
      function reset(){
        state = {color:"",bold:false,italic:false,underline:false,strike:false};
      }
      for(let i=0;i<raw.length;i++){
        const ch = raw.charAt(i);
        if(ch === "§" && i + 1 < raw.length){
          const code = raw.charAt(++i).toLowerCase();
          flush();
          if(code === "x" && i + 12 < raw.length){
            let hex = "", ok = true;
            for(let h=0;h<6;h++){
              if(raw.charAt(i+1+h*2) !== "§" || !/^[0-9a-f]$/i.test(raw.charAt(i+2+h*2))){ ok = false; break; }
              hex += raw.charAt(i+2+h*2);
            }
            if(ok){ reset(); state.color = "#"+hex; i += 12; continue; }
          }
          if(colors[code]){ reset(); state.color = colors[code]; }
          else if(code === "l") state.bold = true;
          else if(code === "o") state.italic = true;
          else if(code === "n") state.underline = true;
          else if(code === "m") state.strike = true;
          else if(code === "r") reset();
          continue;
        }
        buf += ch;
      }
      flush();
      return out;
    }

    function allOverlayItems(){

    function overlayItemId(entry){
      if(!entry || typeof entry !== "object") return "";
      if(entry.item != null || entry.itemId != null) return String(entry.item || entry.itemId || "");
      const raw = String(entry.nbt || "");
      const m = raw.match(/(?:id|Name)\s*[:=]\s*["']?([a-z0-9_:.\/-]+)/i);
      return m ? String(m[1] || "") : "";

    function findOverlaySlotForItem(itemId){
      const target = String(itemId || "").trim();
      if(!target) return -1;
      const list = allOverlayItems();
      let best = -1;
      for(let i=0;i<list.length;i++){
        const entry = list[i] || {};
        if(overlayItemId(entry) !== target) continue;
        const slot = Number(entry.slot);
        if(!Number.isFinite(slot) || slot < 0) continue;
        if(best < 0 || slot < best) best = slot;
      }
      return best;
    }

    function resolveCurrencySlot(data){

      const itemId = String(data.currencyItemId || data.currencyItem || "").trim();

    function makeElBox(item){
      const base = getBaseResolution();
      const stageW = Math.max(160, Number(getComputedStyle(document.documentElement).getPropertyValue("--stage-w")) || window.innerWidth || base.w);

      const sy = stageH / base.h;

      // Editor x/y/w/h are source of truth. Responsive.normalized can be stale in older JSON.
      const box = {
        x: Number(item.x || 0) * sx,
        y: Number(item.y || 0) * sy,

      node.style.width = `${Math.round(box.w)}px`;
      node.style.height = `${Math.round(box.h)}px`;
      node.style.zIndex = String(Number(item.z || 0));

            const alpha = clamp((item.opacity ?? 100) / 100, 0.05, 1);

    function startTyping(linesNode, fullText, mode, cps, onDone){
      const text = String(fullText || "");
      const speed = Math.max(1, Math.min(120, Number(cps || 24)));
      const stepMs = Math.max(5, Math.floor(1000 / speed));
      let idx = 0;
      linesNode.textContent = "";
      const tick = () => {
        if(idx >= text.length){
          onDone && onDone();
          return;
        }
        const ch = text.charAt(idx++);
        linesNode.textContent += ch;
        let delay = stepMs;
        if(mode === "sentence" && /[.!?]/.test(ch)) delay += 220;
        if(ch === "\n") delay += 120;
        const id = setTimeout(tick, delay);
        runtimeTimers.push(id);
      };
      tick();
    }
    function wrapCanvasLines(ctx, text, maxWidth){
      var out = [];
      var paragraphs = String(text || '').replace(/\r\n/g, '\n').split('\n');
      for(var p=0;p<paragraphs.length;p++){
        var raw = String(paragraphs[p] || '');
        if(!raw){ out.push(''); continue; }
        var parts = raw.split(/(\s+)/).filter(Boolean);
        var line = '';
        for(var i=0;i<parts.length;i++){
          var part = parts[i];
          var test = line + part;
          if(line && ctx.measureText(test).width > maxWidth){
            out.push(line);
            line = String(part).replace(/^\s+/, '');
          }else{
            line = test;
          }
        }
        out.push(line);
      }
      return out;
    }

    function paginateDialogText(linesNode, fullText, maxW, maxH){
      var cs = getComputedStyle(linesNode);
      var fontSize = Math.max(8, parseFloat(cs.fontSize) || 14);
      var fontFamily = cs.fontFamily || 'sans-serif';
      var lineHeight = parseFloat(cs.lineHeight);
      if(!isFinite(lineHeight) || lineHeight <= 0) lineHeight = fontSize * 1.35;

      var canvas = paginateDialogText._c || (paginateDialogText._c = document.createElement('canvas'));
      var ctx = canvas.getContext('2d');
      if(!ctx) return [String(fullText || '')];
      ctx.font = fontSize + 'px ' + fontFamily;

      var wrapped = wrapCanvasLines(ctx, fullText, Math.max(1, maxW));
      var perPage = Math.max(1, Math.floor(Math.max(1, maxH) / lineHeight));
      var pages = [];
      for(var j=0;j<wrapped.length;j+=perPage){
        pages.push(wrapped.slice(j, j + perPage).join('\n'));
      }
      return pages.length ? pages : [''];
    }

    function setupDialogPaging(node, overlay, lines, speakerNode, indicator, item, fullText, anim, cps){
      var raf = window.requestAnimationFrame || function(fn){ return setTimeout(fn, 0); };
      raf(function(){
        try{
          var gapPx = parseFloat(getComputedStyle(overlay).gap) || 0;
          var speakerH = speakerNode ? speakerNode.offsetHeight : 0;
          var availW = Math.max(1, (lines.clientWidth || overlay.clientWidth || 1));
          var availH = Math.max(1, (overlay.clientHeight || 1) - (speakerNode ? (speakerH + gapPx) : 0));
          lines.style.maxHeight = String(Math.floor(availH)) + 'px';
          lines.style.overflow = 'hidden';

          var pages = paginateDialogText(lines, fullText, availW, availH);
          var paging = pages.length > 1;
          var pageIndex = 0;

          var renderPage = function(){
            clearRuntimeTimers();
            var pageText = pages[pageIndex] || '';
            if(anim === 'none' || anim === 'at-once'){
              lines.textContent = pageText;
            }else{
              lines.textContent = '';
              startTyping(lines, pageText, anim, cps, function(){});
            }
          };

          if(!paging){
            if(anim === 'none' || anim === 'at-once'){
              lines.textContent = fullText;
            }else{
              lines.textContent = '';
              var skipOnce = function(ev){
                try{ if(ev){ ev.preventDefault(); ev.stopPropagation(); } }catch(e){}
                try{ clearRuntimeTimers(); lines.textContent = fullText; }catch(e){}
                cleanupSkipOnce();
              };
              var cleanupSkipOnce = function(){
                try{ node.removeEventListener('pointerdown', skipOnce); }catch(e){}
                try{ node.removeEventListener('mousedown', skipOnce); }catch(e){}
                try{ node.removeEventListener('click', skipOnce); }catch(e){}
              };
              startTyping(lines, fullText, anim, cps, function(){ cleanupSkipOnce(); });
              try{ node.addEventListener('pointerdown', skipOnce, { passive:false }); }catch(e){}
              node.addEventListener('mousedown', skipOnce);
              node.addEventListener('click', skipOnce);
            }
            return;
          }

          if(indicator) try{ indicator.classList.add('hidden'); }catch(e){}
          var setPage = function(nextIdx){
            var ni = Number(nextIdx || 0);
            if(!isFinite(ni)) ni = 0;
            if(ni < 0) ni = 0;
            if(ni > pages.length - 1) ni = pages.length - 1;
            pageIndex = ni;
            renderPage();
            try{ node.__dc_paging.pageIndex = pageIndex; }catch(e){}
          };
          try{ node.__dc_paging = { pages: pages, pageIndex: pageIndex, pageCount: pages.length, setPage: setPage }; }catch(e){}

          if(HAS_PAGER){
            setPage(0);
            var fastForward = function(ev){

              try{ if(ev){ ev.preventDefault(); ev.stopPropagation(); } }catch(e){}
              if(anim === 'none' || anim === 'at-once') return;
              var pageText = pages[pageIndex] || '';
              if(String(lines.textContent || '').length < String(pageText).length){
                try{ clearRuntimeTimers(); lines.textContent = pageText; }catch(e){}
              }
            };
            try{ node.addEventListener('pointerdown', fastForward, { passive:false }); }catch(e){}
            node.addEventListener('mousedown', fastForward);
            node.addEventListener('click', fastForward);
            return;
          }

          var nav = document.createElement('div');
          nav.className = 'pageNav';
          var prev = document.createElement('button');
          prev.type = 'button';
          prev.className = 'pageBtn';
      prev.textContent = "\u25C0";
          var counter = document.createElement('div');
          counter.className = 'pageCounter';
          var next = document.createElement('button');
          next.type = 'button';
          next.className = 'pageBtn';
      next.textContent = "\u25B6";
          nav.appendChild(prev);
          nav.appendChild(counter);
          nav.appendChild(next);
          node.appendChild(nav);

          var uiScale = node.__dc_uiScale || 1;
          var btnW = Math.max(16, Number(item.dialogPageBtnW != null ? item.dialogPageBtnW : 44) * uiScale);
          var btnH = Math.max(16, Number(item.dialogPageBtnH != null ? item.dialogPageBtnH : 34) * uiScale);
          var btnGap = Math.max(0, Number(item.dialogPageBtnGap != null ? item.dialogPageBtnGap : 8) * uiScale);
          nav.style.gap = String(Math.round(btnGap)) + 'px';
          prev.style.width = String(Math.round(btnW)) + 'px';
          prev.style.height = String(Math.round(btnH)) + 'px';
          next.style.width = String(Math.round(btnW)) + 'px';
          next.style.height = String(Math.round(btnH)) + 'px';
          if(applyChoiceButtonTexture(prev, item, 0)) stripButtonChromeForTexture(prev);
          if(applyChoiceButtonTexture(next, item, 1)) stripButtonChromeForTexture(next);
          counter.style.fontSize = String(Math.max(10, Math.round(12 * uiScale))) + 'px';

          var syncNavPos = function(){
            var box = node.__dc_box || { w: node.clientWidth, h: node.clientHeight };
            var pad = Math.max(0, Number(item.padding != null ? item.padding : 12) * uiScale);
            var xBase = Number(item.dialogPageNavX != null ? item.dialogPageNavX : -1);
            var yBase = Number(item.dialogPageNavY != null ? item.dialogPageNavY : -1);
            nav.style.right = '';
            nav.style.bottom = '';
            if(xBase >= 0) nav.style.left = String(Math.round(xBase * uiScale)) + 'px';
            else { nav.style.left = ''; nav.style.right = String(Math.max(0, Math.round(pad + 10))) + 'px'; }
            if(yBase >= 0) nav.style.top = String(Math.round(yBase * uiScale)) + 'px';
            else { nav.style.top = ''; nav.style.bottom = String(Math.max(0, Math.round(pad + 10))) + 'px'; }
          };
          raf(syncNavPos);

          var sync = function(){
            prev.disabled = pageIndex <= 0;
            next.disabled = pageIndex >= pages.length - 1;
            counter.textContent = String(pageIndex + 1) + ' / ' + String(pages.length);
            renderPage();
          };
prev.addEventListener('click', function(ev){
            try{ ev.stopPropagation(); }catch(e){}
            if(pageIndex > 0){ pageIndex -= 1; sync(); }
          });
          next.addEventListener('click', function(ev){
            try{ ev.stopPropagation(); }catch(e){}
            if(pageIndex < pages.length - 1){ pageIndex += 1; sync(); }
          });

          var fastForward = function(ev){
              try{ if(ev){ ev.preventDefault(); ev.stopPropagation(); } }catch(e){}
              if(anim === 'none' || anim === 'at-once') return;
            var pageText = pages[pageIndex] || '';
            if(String(lines.textContent || '').length < String(pageText).length){
              try{ clearRuntimeTimers(); lines.textContent = pageText; }catch(e){}
            }
          };
          try{ node.addEventListener('pointerdown', fastForward, { passive:false }); }catch(e){}
          node.addEventListener('mousedown', fastForward);
          node.addEventListener('click', fastForward);

          sync();
        }catch(err){
          DCERR('setupDialogPaging failed', err);
        }
      });
    }

    function renderDialog(stage, item){

      node.classList.add("dialog");

      const pad = Math.max(0, Number(item.padding ?? 12) * uiScale);

      overlay.style.right = String(Math.round(pad)) + 'px';
      overlay.style.bottom = String(Math.round(pad)) + 'px';

      const cursorStyle = String(item.dialogCursorStyle || "none");

      const textSizeBase = Math.max(8, Math.min(72, Number(item.dialogTextSize || 14)));
      const textSizePx = Math.max(8, Math.round(textSizeBase * uiScale));
      lines.style.fontSize = String(textSizePx) + 'px';
      lines.style.textAlign = String(item.dialogTextAlign || "left");
      lines.style.color = (item.dialogTextColorNone || isNoneColorValue(item.dialogTextColor)) ? "transparent" : String(item.dialogTextColor || "rgba(255,255,255,.9)");
      const speakerPx = Math.max(10, Math.round((textSizeBase + 4) * uiScale));
      if(speakerNode) speakerNode.style.fontSize = String(speakerPx) + 'px';
      const dialogFontFamily = resolveDialogFontFamily(item);
      if(dialogFontFamily){
        lines.style.fontFamily = dialogFontFamily + ", var(--gui-font-family)";
        if(speakerNode) speakerNode.style.fontFamily = dialogFontFamily + ", var(--gui-font-family)";
      }

      const richShopPriceRendered = shopRole === "price" && renderShopPriceValue(lines, getShopPriceData(), fullText, uiScale, textSizePx);

      const richShopBalanceRendered = shopRole === "balance" && renderShopBalanceValue(lines, getShopBalanceData(), fullText, uiScale, textSizePx);

      const richShopPriceBalanceRendered = shopRole === "price_balance" && renderShopPriceBalanceValue(lines, uiScale, textSizePx);

      const richShopValueRendered = richShopPriceRendered || richShopBalanceRendered || richShopPriceBalanceRendered;

      const indicatorShape = getDialogCursorShape(cursorStyle, cursorCustom);
      const indicator = document.createElement("div");
      indicator.className = indicatorShape.className + ((anim === "none" || cursorStyle === "none") ? " hidden" : "");
      indicator.textContent = indicatorShape.text;
      indicator.style.setProperty("--cursor-speed", String(blink) + 's');

      const dialogImagePath = String(item.dialogImagePath || "").trim();
      if(dialogImagePath){
        const media = document.createElement("div");
        media.className = "mediaImg";
        applyCropBackground(media, dialogImagePath, readImageCrop(item, "dialogImage"), {
          scale:item.dialogImageScale || 100,
          insetX:0,
          offsetX:item.dialogImageOffsetX || 0,
          offsetY:item.dialogImageOffsetY || 0
        });
        node.appendChild(media);
      }

      if(speakerNode) overlay.appendChild(speakerNode);
      overlay.appendChild(lines);
      node.appendChild(overlay);
      node.appendChild(indicator);
      stage.appendChild(node);

      if(!richShopValueRendered) setupDialogPaging(node, overlay, lines, speakerNode, indicator, item, fullText, anim, cps);
    }

    function renderImage(stage, item, runtimePath){
      const node = makeElBox(item);
      const img = document.createElement("div");
      img.className = "mediaImg";
      const path = String(runtimePath || "").trim();
      applyCropBackground(img, path, readImageCrop(item, "image"), { scale:item.imageScale || 100, insetX:item.imageInsetX || 0, offsetX:item.imageOffsetX || 0, offsetY:item.imageOffsetY || 0 });

    function renderEntity(stage, item){
      const node = makeElBox(item);
      const box = node.__dc_box || { w: Math.max(1, Number(item.w || 1)), h: Math.max(1, Number(item.h || 1)) };
      const labelKey = String(item.entityLabel || item.name || "").trim();
      const slot = (INIT && INIT.entitySlots) ? INIT.entitySlots[labelKey] : null;
      if(slot == null) DCWARN("entity slot missing", { labelKey, entitySlots: INIT && INIT.entitySlots ? Object.keys(INIT.entitySlots) : [] });
      DCLOG("entity", { labelKey, slot });
      const el = document.createElement("div");
      el.className = "entitySlot";
      if(slot != null){
        el.setAttribute("data-mc-entity", String(slot));
        let mul = Number(item.entityScale);
        if(!Number.isFinite(mul)) mul = 1;
        if(mul > 10) mul = mul / 100;
        if(mul < 0.1) mul = 0.1;
        if(mul > 5) mul = 5;
        el.style.width = `${Math.max(1, Math.round(box.w * mul))}px`;
        el.style.height = `${Math.max(1, Math.round(box.h * mul))}px`;

    }
    function renderChoiceBox(stage, item, choices, startIndex){
      const node = makeElBox(item);
      const box = document.createElement("div");
      box.className = "choiceBox";
      node.appendChild(box);

      const sx = node.__dc_sx || 1;
      const sy = node.__dc_sy || 1;
      const uiScale = node.__dc_uiScale || 1;
      const nodeBox = node.__dc_box || { x:0, y:0, w:Math.max(1, Number(item.w || 1) * sx), h:Math.max(1, Number(item.h || 1) * sy) };
      const role = String(item && item.shopRole || "").trim();
      const itemSlotMode = role === "item_slots" || role === "selected_slot";
      const itemSlotListMode = role === "item_slots" && String(item.choiceSlotLayout || "").toLowerCase() === "list";
      const quantitySelectorMode = role === "quantity_selector";
      const priceLabelMode = role === "item_slots";

      const content = document.createElement("div");
      content.style.position = "absolute";
      content.style.inset = "0";
      content.style.padding = "0";
      content.style.boxSizing = "border-box";
      content.style.overflow = "visible";
      box.appendChild(content);

      const choiceFontFamily = resolveChoiceFontFamily(item);
      if(choiceFontFamily){
        box.style.fontFamily = choiceFontFamily + ", var(--gui-font-family)";
        content.style.fontFamily = choiceFontFamily + ", var(--gui-font-family)";
      }

      const count = Math.max(1, choices.length || Number(item.choiceCount || 1));
      const centerRole = role === "category_buttons" || role === "item_slots" || role === "selected_slot" || role === "quantity_selector" || role === "buy_button" || role === "page_nav";
      const rawStartX = Math.max(0, Number(item.choiceStartX ?? 12)) * sx;
      const rawStartY = Math.max(0, Number(item.choiceStartY ?? 12)) * sy;
      const startX = centerRole ? 0 : rawStartX;
      const startY = centerRole ? 0 : rawStartY;
      const gapX = Math.max(0, Number(item.choiceGapX ?? 0)) * sx;
      const gapY = Math.max(0, Number(item.choiceGapY ?? 10)) * sy;
      let btnMinW = Math.max(quantitySelectorMode ? 24 : 60, Number(item.choiceWidth ?? 180) * sx);
      let btnH = Math.max(24, Number(item.choiceHeight ?? 42) * sy);
      if(itemSlotMode){
        const slotBase = Math.max(Number(item.choiceWidth || 72), Number(item.choiceHeight || 72), 24);
        const slotSize = Math.max(24, Math.round(slotBase * uiScale));
        btnMinW = slotSize;
        btnH = slotSize;
      }
      let cols = Math.max(1, Math.min(count, Number(item.choiceColumns ?? 2)));
      if(quantitySelectorMode) cols = Math.max(1, Math.min(count, 3));
      const baseSize = Number(item.choiceBtnTextSize ?? 13);
      const fontSize = Math.max(8, Math.round((Number.isFinite(baseSize) ? baseSize : 13) * uiScale));
      const priceGapY = priceLabelMode && !itemSlotListMode ? Math.max(0, Number(item.choicePriceGapY ?? 6)) * sy : 0;
      const priceLabelH = priceLabelMode && !itemSlotListMode ? Math.ceil(fontSize * 1.2) : 0;
      const cellH = btnH + priceGapY + priceLabelH;
      const infoGapX = (itemSlotListMode ? Math.max(0, Number(item.choiceGapX ?? item.choiceInfoGapX ?? 24)) : Math.max(0, Number(item.choiceInfoGapX ?? 18))) * sx;
      const stockPriceGapX = itemSlotListMode ? Math.max(0, Number(item.choiceStockPriceGapX ?? item.choicePriceGapY ?? 24)) * sx : 0;
      const stockWidth = Math.max(42, Number(item.choiceStockWidth ?? 72)) * sx;
      const priceWidth = Math.max(42, Number(item.choicePriceWidth ?? 84)) * sx;
      const listColGapX = itemSlotListMode ? Math.max(0, Number(item.choiceInfoGapX ?? 24)) * sx : gapX;
      let listCellW = 0;
      const availableW = Math.max(btnMinW, Number(nodeBox.w || 0) - startX);

      const measureCanvas = renderChoiceBox.__measureCanvas || (renderChoiceBox.__measureCanvas = document.createElement("canvas"));
      const measureCtx = measureCanvas.getContext("2d");
      if(measureCtx) measureCtx.font = `700 ${fontSize}px ${getComputedStyle(content).fontFamily || getComputedStyle(document.body).fontFamily || "sans-serif"}`;
      const autoFitText = shouldAutoFitChoiceTextRole(role);

      function shouldAutoFitChoiceTextRole(roleName){
        const blocked = { item_slots:true, selected_slot:true, quantity_selector:true, buy_button:true, page_nav:true };
        return !blocked[String(roleName || "").trim()];
      }

      function getChoiceTextFitMinPx(px){
        const base = Math.max(8, Math.round(Number(px || 13)));
        return Math.max(8, Math.min(base, Math.round(base <= 12 ? base - 2 : base - 4)));
      }

      function setChoiceMeasureFont(px){
        if(!measureCtx) return;
        measureCtx.font = `700 ${Math.max(8, Math.round(px))}px ${getComputedStyle(content).fontFamily || getComputedStyle(document.body).fontFamily || "sans-serif"}`;
      }

      function measureChoiceTextWidth(value, px){
        const text = String(value || "");
        if(measureCtx){
          setChoiceMeasureFont(px);
          return measureCtx.measureText(text).width;
        }
        return text.length * Math.max(8, Number(px || 13)) * 0.62;
      }

      function countChoiceWrappedLines(value, maxWidth, px){
        const width = Math.max(1, Number(maxWidth || 1));
        const paragraphs = String(value || "").replace(/\r/g, "").split("\n");
        let total = 0;
        paragraphs.forEach(function(paragraph){
          const raw = String(paragraph || "");
          if(!raw){
            total += 1;
            return;
          }
          const tokens = raw.split(/(\s+)/).filter(function(token){ return token.length; });
          let line = "";
          tokens.forEach(function(token){
            const next = line ? line + token : token.replace(/^\s+/, "");
            if(!next) return;
            if(measureChoiceTextWidth(next, px) <= width){
              line = next;
              return;
            }
            if(line){
              total += 1;
              line = token.replace(/^\s+/, "");
            }
            while(line && measureChoiceTextWidth(line, px) > width){
              let cut = 1;
              for(let i = 1; i <= line.length; i++){
                const part = line.slice(0, i);
                if(measureChoiceTextWidth(part, px) > width) break;
                cut = i;
              }
              total += 1;
              line = line.slice(Math.max(1, cut));
            }
          });
          if(line) total += 1;
        });
        return Math.max(1, total);
      }

      function measureChoiceTextFit(label, buttonW, buttonH, px){
        const basePx = Math.max(8, Math.round(Number(px || 13)));
        const minPx = getChoiceTextFitMinPx(basePx);
        const horizontalPad = Math.max(24, Math.round(28 * uiScale));
        const verticalPad = Math.max(8, Math.round(basePx * 0.72));
        const textW = Math.max(1, Number(buttonW || 1) - horizontalPad);
        const singleLineText = String(label || "").replace(/\s+/g, " ").trim();
        for(let size = basePx; size >= minPx; size--){
          if(measureChoiceTextWidth(singleLineText, size) <= textW){
            return { fontSize:size, height:Math.max(Number(buttonH || 0), Math.ceil(size * 1.2 + verticalPad)), lines:1 };
          }
        }
        const lines = countChoiceWrappedLines(label, textW, minPx);
        const textH = Math.ceil(lines * minPx * 1.18 + verticalPad);
        return { fontSize:minPx, height:Math.max(Number(buttonH || 0), textH), lines:lines };
      }

      const choiceWidths = choices.map((ch, index) => {
        if(quantitySelectorMode){
          const fieldW = Math.max(24, Number(item.choiceStockWidth ?? Math.round(btnMinW * 1.7)) * sx);
          return index % 3 === 1 ? fieldW : btnMinW;
        }
        if(itemSlotMode || role) return btnMinW;
        const label = String(ch && ch.label || "");
        const textW = measureCtx ? measureCtx.measureText(label).width : label.length * fontSize * 0.62;
        const padded = textW + Math.max(28, 36 * uiScale);
        return Math.min(availableW, Math.max(btnMinW, Math.ceil(padded)));
      });

      let layoutW = btnMinW;
      if(itemSlotListMode){
        listCellW = btnMinW + infoGapX + stockWidth + stockPriceGapX + priceWidth;
        const targetW = Math.max(listCellW, Number(nodeBox.w || 0) - startX);
        cols = Math.max(1, Math.min(count, Math.floor((targetW + listColGapX) / (listCellW + listColGapX))));
        layoutW = cols * listCellW + Math.max(0, cols - 1) * listColGapX;
      }else{
        for(let rowStart=0; rowStart<choiceWidths.length; rowStart+=cols){
          const row = choiceWidths.slice(rowStart, rowStart + cols);
          const rowW = row.reduce((sum, w) => sum + w, 0) + Math.max(0, row.length - 1) * gapX;
          layoutW = Math.max(layoutW, rowW);
        }
      }
      layoutW = Math.min(availableW, layoutW);
      const rows = Math.max(1, Math.ceil(count / cols));
      const textFits = autoFitText ? choices.map(function(ch, index){
        return measureChoiceTextFit(String(ch && ch.label || ""), choiceWidths[index] || btnMinW, btnH, fontSize);
      }) : [];
      const itemHeights = choices.map(function(_, index){
        if(autoFitText && textFits[index]) return Math.max(btnH, Number(textFits[index].height || btnH));
        return cellH;
      });
      const textFontSizes = choices.map(function(_, index){
        if(autoFitText && textFits[index]) return Math.max(8, Number(textFits[index].fontSize || fontSize));
        return fontSize;
      });
      const rowHeights = [];
      const rowTops = [];
      let layoutH = 0;
      for(let row=0; row<rows; row++){
        const start = row * cols;
        const rowItems = itemHeights.slice(start, start + cols);
        const rowH = Math.max(cellH, ...rowItems);
        rowTops[row] = layoutH;
        rowHeights[row] = rowH;
        layoutH += rowH;
        if(row < rows - 1) layoutH += gapY;
      }
      const layoutLeft = centerRole ? Math.max(0, Math.round((Number(nodeBox.w || 0) - layoutW) / 2)) : Math.round(startX);
      const layoutTop = centerRole ? Math.max(0, Math.round((Number(nodeBox.h || 0) - layoutH) / 2)) : Math.round(startY);

      const layout = document.createElement("div");
      layout.style.position = autoFitText ? "relative" : "absolute";
      layout.style.left = autoFitText ? "0" : `${layoutLeft}px`;
      layout.style.top = autoFitText ? "0" : `${layoutTop}px`;
      if(autoFitText){
        layout.style.marginLeft = `${layoutLeft}px`;
        layout.style.marginTop = `${layoutTop}px`;
      }
      layout.style.width = `${Math.round(layoutW)}px`;
      layout.style.height = `${Math.round(layoutH)}px`;
      layout.style.overflow = "visible";
      content.appendChild(layout);
      if(autoFitText){
        box.classList.add("choiceScrollBox");
        content.style.overflowX = "hidden";
        content.style.overflowY = layoutH > Number(nodeBox.h || 0) ? "auto" : "hidden";
      }

      function applyButtonStyle(btn){
        const btnAlpha = clamp((Number(item.choiceBtnOpacity ?? 85) / 100), 0, 1);
        const fillNone = (item.choiceBtnFillNone === true) || isNoneColorValue(item.choiceBtnFill);
        const borderNone = (item.choiceBtnBorderNone === true) || isNoneColorValue(item.choiceBtnBorder);
        btn.style.background = fillNone ? "transparent" : applyAlphaToColor(String(item.choiceBtnFill || "rgba(10,14,22,0.75)"), btnAlpha);
        btn.style.borderStyle = borderNone ? "none" : "solid";
        btn.style.borderWidth = borderNone ? "0px" : "1px";
        btn.style.borderColor = borderNone ? "transparent" : applyAlphaToColor(String(item.choiceBtnBorder || "rgba(255,255,255,0.16)"), btnAlpha);
        const align = String(item.choiceBtnTextAlign || (role ? "center" : "left")).toLowerCase();
        btn.style.textAlign = (align === "center" || align === "right") ? align : "left";
        btn.style.justifyContent = align === "center" ? "center" : (align === "right" ? "flex-end" : "flex-start");
        const visualIndexRaw = parseInt(String(btn && btn.dataset ? (btn.dataset.choiceVisualIndex || "-1") : "-1"), 10);
        const visualIndex = Number.isFinite(visualIndexRaw) ? visualIndexRaw : -1;
        const fitFontSize = autoFitText && visualIndex >= 0 && textFontSizes[visualIndex] ? textFontSizes[visualIndex] : fontSize;
        btn.style.fontSize = String(fitFontSize) + "px";
        btn.style.lineHeight = autoFitText && !itemSlotMode && !quantitySelectorMode ? "1.18" : "1.2";
        if(autoFitText && !itemSlotMode && !quantitySelectorMode){

      function sendChoicePayload(target, ch, ev, overrideData, useDebounce){
        try{ if(ev && typeof ev.preventDefault === "function") ev.preventDefault(); }catch(e){}
        try{ if(ev && typeof ev.stopPropagation === "function") ev.stopPropagation(); }catch(e){}
        if(useDebounce !== false){
          try{
            const now = Date.now();
            if(target.__dc_lastFire && (now - target.__dc_lastFire) < 250) return;
            target.__dc_lastFire = now;
          }catch(e){}
        }
        try{
          if(window.cnpc && typeof window.cnpc.sendEvent === "function"){
            const baseData = ch && ch.data && typeof ch.data === "object" ? ch.data : null;
            const data = overrideData && typeof overrideData === "object" ? Object.assign({}, baseData || {}, overrideData) : baseData;
            const payload = {
              __overlayName: String((INIT && INIT.__overlayName) || 'dc_gui_runtime'),
              __runtimeOwner: String((INIT && INIT.__runtimeOwner) || ''),
              __event: 'choice',
              sessionId: String((INIT && INIT.sessionId) || ''),
              index: Number(target.dataset.choiceIndex || "0"),
              label: String((ch && ch.label) || ""),
              role: String((ch && ch.role) || ""),
              data: data
            };
            window.cnpc.sendEvent("choice", payload);
          }
        }catch(e){}
      }

      function wireChoice(btn, ch){
        btn.dataset.choiceIndex = String(ch && ch.index != null ? ch.index : 0);
        const fireChoice = (ev) => {
          sendChoicePayload(btn, ch, ev, null, true);
        };
        try{ btn.addEventListener("pointerdown", fireChoice, { passive:false }); }catch(e){}
        try{ btn.addEventListener("touchstart", fireChoice, { passive:false }); }catch(e){}
        btn.addEventListener("mousedown", fireChoice);
        btn.addEventListener("click", fireChoice);

      function wireQuantityInput(input, ch){
        input.dataset.choiceIndex = String(ch && ch.index != null ? ch.index : 0);
        input.__dc_lastCommittedQuantity = String(input.value || "");
        const stop = (ev) => {
          try{ if(ev && typeof ev.stopPropagation === "function") ev.stopPropagation(); }catch(e){}
        };
        const clean = () => {
          let value = String(input.value || "").replace(/[^0-9]/g, "");
          if(value.length > 3) value = value.slice(0, 3);
          input.value = value;
          return value;
        };
        const commit = (ev) => {
          const raw = clean();
          const qty = Math.max(1, Math.min(999, parseInt(raw || "1", 10) || 1));
          input.value = String(qty);
          if(String(qty) === String(input.__dc_lastCommittedQuantity || "") && ev && ev.type !== "keydown") return;
          input.__dc_lastCommittedQuantity = String(qty);
          sendChoicePayload(input, ch, ev, { quantity: qty }, false);
        };
        input.addEventListener("input", clean);
        input.addEventListener("blur", commit);
        input.addEventListener("keydown", function(ev){
          stop(ev);
          if(ev && ev.key === "Enter"){
            commit(ev);
            try{ input.blur(); }catch(e){}
          }
        });
        try{ input.addEventListener("pointerdown", stop, { passive:false }); }catch(e){}
        try{ input.addEventListener("touchstart", stop, { passive:false }); }catch(e){}
        input.addEventListener("mousedown", stop);
        input.addEventListener("click", stop);
      }

          const slotTextured = applySlotButtonTexture(btn, item);

        if(role === "quantity_selector" && String(ch && ch.data && ch.data.shopAction || "") === "quantity_value"){

          input.dataset.choiceVisualIndex = String(i);

          input.value = String(Math.max(1, Math.min(999, parseInt(String(rawQty || "1"), 10) || 1)));
          applyButtonStyle(input);

        const btn = document.createElement("button");
        btn.type = "button";
        btn.className = autoFitText ? "choiceBtn choiceTextFit" : "choiceBtn";
        btn.style.position = "absolute";
        btn.style.left = `${Math.round(left)}px`;

    function findElByDataId(id){
      try{
        var target = String(id || '').trim();
        if(!target) return null;
        var nodes = document.querySelectorAll('.el');
        for(var i=0;i<nodes.length;i++){
          var v = String(nodes[i].getAttribute('data-el-id') || '');
          if(v === target) return nodes[i];
        }
      }catch(e){}
      return null;
    }
    function resolvePagerTargetId(elements, item){
      var direct = String(item && item.pageTargetId || '').trim();
      if(direct) return direct;
      for(var i=0;i<elements.length;i++){
        var it = elements[i] || {};
        if(String(it.type || '').toLowerCase() === 'dialog') return String(it.id || '');
      }
      return '';
    }

    function syncPagerNode(pagerNode){
      try{
        if(!pagerNode) return;
        var targetId = String(pagerNode.dataset.targetId || '').trim();
        if(!targetId) return;
        var dialogNode = findElByDataId(targetId);
        var nav = pagerNode.querySelector('.pageNav');
        if(!nav) return;
        var prev = nav.querySelector('[data-page-prev]');
        var next = nav.querySelector('[data-page-next]');
        var counter = nav.querySelector('[data-page-counter]');
        var paging = dialogNode && dialogNode.__dc_paging ? dialogNode.__dc_paging : null;
        if(!paging || !paging.pages || paging.pages.length <= 1){
          nav.style.display = 'none';
          return;
        }
        nav.style.display = '';
        var idx = Number(paging.pageIndex || 0) || 0;
        if(prev) prev.disabled = idx <= 0;
        if(next) next.disabled = idx >= paging.pages.length - 1;
        if(counter) counter.textContent = String(idx + 1) + ' / ' + String(paging.pages.length);
      }catch(e){}
    }

      nav.appendChild(next);
      wrap.appendChild(nav);

      var stop = function(ev){ try{ ev.stopPropagation(); }catch(e){} };
var stopPagerEv = function(ev){
        try{ if(ev){ ev.preventDefault(); ev.stopPropagation(); } }catch(e){}
      };
      try{ prev.addEventListener('pointerdown', stopPagerEv, { passive:false }); }catch(e){}
      try{ next.addEventListener('pointerdown', stopPagerEv, { passive:false }); }catch(e){}
      prev.addEventListener('mousedown', stopPagerEv);
      next.addEventListener('mousedown', stopPagerEv);
      prev.addEventListener('click', function(ev){
        stop(ev);
        var dialogNode = findElByDataId(targetId);
        if(dialogNode && dialogNode.__dc_paging && dialogNode.__dc_paging.setPage){
          dialogNode.__dc_paging.setPage(Number(dialogNode.__dc_paging.pageIndex || 0) - 1);
          syncPagerNode(node);
        }
      });
      next.addEventListener('click', function(ev){
        stop(ev);
        var dialogNode = findElByDataId(targetId);
        if(dialogNode && dialogNode.__dc_paging && dialogNode.__dc_paging.setPage){
          dialogNode.__dc_paging.setPage(Number(dialogNode.__dc_paging.pageIndex || 0) + 1);
          syncPagerNode(node);
        }
      });

      // initial sync after dialog paging is ready
      (window.requestAnimationFrame || function(fn){ return setTimeout(fn,0); })(function(){ syncPagerNode(node); });
    }
    function fxList(fx, key){
      if(!fx || typeof fx !== "object") return [];
      const direct = fx[key];
      if(Array.isArray(direct)) return direct;
      if(direct && typeof direct === "object") return [direct];
      if(Array.isArray(fx.items)) return fx.items.filter(item => String(item && (item.fxType || item.type) || "").toLowerCase() === key);
      return [];
    }
    function fxImageList(fx){ return fxList(fx, "image"); }
    function fxImageRuntimePath(fx){
      if(!fx || typeof fx !== "object") return "";
      const asset = fx.asset && typeof fx.asset === "object" ? fx.asset : null;
      let path = String(asset && asset.path || "").trim();
      return path.replace(/\\/g, "/").replace(/^\/+/, "");
    }

    function fxTargetMatches(item, fx){
      const id = String(item && item.id || "");
      const name = String(item && item.name || "");
      const key = String(fx && (fx.targetElementKey || fx.guiTargetKey || "") || "").split(".")[0];
      const targetId = String(fx && (fx.targetElementId || fx.guiImageElementId || fx.elementId || "") || "");
      const targetName = String(fx && (fx.targetElementName || fx.guiImageElementName || "") || "");
      return (key && key === id) || (targetId && targetId === id) || (targetName && targetName === name);
    }

    function applyTextFxToElements(elements){
      const textFx = BIND && BIND.textFx;
      const images = fxImageList(textFx);
      if(!images.length) return elements;
      const out = elements.map((item) => item && typeof item === "object" ? Object.assign({}, item) : item);
      const readFxCrop = function(fx){
        const render = fx && typeof fx.render === "object" ? fx.render : {};
        const raw = render.crop && typeof render.crop === "object" ? render.crop : null;
        if(!raw) return null;
        const enabled = raw.enabled !== false;
        const w = Math.max(0, Number(raw.w || 0) || 0);
        const h = Math.max(0, Number(raw.h || 0) || 0);
        if(!enabled || w <= 0 || h <= 0) return null;
        return {
          enabled:true,
          x:Number(raw.x || 0) || 0,
          y:Number(raw.y || 0) || 0,
          w:w,
          h:h,
          sourceW:Math.max(0, Number(raw.sourceW || 0) || 0),
          sourceH:Math.max(0, Number(raw.sourceH || 0) || 0)
        };
      };
      const applyFxLayout = function(item, fx, type){
        const crop = readFxCrop(fx);
        const render = fx && typeof fx.render === "object" ? fx.render : {};
        if(type === "image"){
          if(crop) item.imageCrop = crop;
          if(render.scale != null) item.imageScale = Number(render.scale) || item.imageScale;
          if(render.sidePadding != null) item.imageInsetX = Number(render.sidePadding) || 0;
          if(render.offsetX != null) item.imageOffsetX = Number(render.offsetX) || 0;
          if(render.offsetY != null) item.imageOffsetY = Number(render.offsetY) || 0;
        }else if(type === "dialog"){
          if(crop) item.dialogImageCrop = crop;
          if(render.scale != null) item.dialogImageScale = Number(render.scale) || item.dialogImageScale;
          if(render.offsetX != null) item.dialogImageOffsetX = Number(render.offsetX) || 0;
          if(render.offsetY != null) item.dialogImageOffsetY = Number(render.offsetY) || 0;
        }
      };
      for(let i=0;i<images.length;i++){
        const fx = images[i] || {};
        const path = fxImageRuntimePath(fx);
        if(!path) continue;
        for(let j=0;j<out.length;j++){
          const item = out[j] || {};
          if(!fxTargetMatches(item, fx)) continue;
          const type = String(item.type || "").toLowerCase();
          if(type === "image") item.imagePath = path;
          else if(type === "dialog") item.dialogImagePath = path;
          else continue;
          applyFxLayout(item, fx, type);
        }
      }
      return out;
    }

    function render(){
      DCLOG("render()", { w: window.innerWidth, h: window.innerHeight, elements: Array.isArray(GUI && GUI.elements) ? GUI.elements.length : 0, choices: (BIND.choice||INIT.choice||[]).length });
      clearRuntimeTimers();
      applyGuiFont();
      setScale();
      setBackground();
      const stage = document.getElementById("stage");
      if(!stage) return;
      stage.innerHTML = "";

      const elements = applyTextFxToElements(Array.isArray(GUI.elements) ? GUI.elements.slice() : []);
      HAS_PAGER = false;
      for(let i=0;i<elements.length;i++){
        const t = String((elements[i] && elements[i].type) || "").toLowerCase();
        if(t === "pager"){ HAS_PAGER = true; break; }
      }
      for(let i=0;i<elements.length;i++){
        if(elements[i] && typeof elements[i] === "object" && elements[i].__index == null) elements[i].__index = i;
      }
      elements.sort(byZThenIndex);

      const allChoices = getChoices();
      let cursor = 0;

      for(let i=0;i<elements.length;i++){
        const item = elements[i] || {};
        const type = String(item.type || "").toLowerCase();

        if(type === "dialog"){
          renderDialog(stage, item);
          continue;
        }
        if(type === "image"){
          const path = String(item.imagePath || "").trim();
          renderImage(stage, item, path);
          continue;
        }
        if(type === "entity"){
          renderEntity(stage, item);
          continue;
        }
        if(type === "pager"){
          renderPager(stage, item, elements);
          continue;
        }
        if(type === "choice"){
          const role = String(item.shopRole || "");
          const shopChoices = role ? getShopChoices(role) : null;
          if(shopChoices){
            renderChoiceBox(stage, item, shopChoices, 0);
            continue;
          }
          const cap = Math.max(1, Number(item.choiceCount || 1));
          const slice = allChoices.slice(cursor, cursor + cap);
          cursor = renderChoiceBox(stage, item, slice, cursor);
          continue;
        }
        // unknown element type
      }
    }

    function parseRuntimeUpdatePayload(raw){
      if(typeof raw === "string"){
        try{ return JSON.parse(raw); }catch(e){ return null; }
      }
      if(raw && raw.detail != null) return parseRuntimeUpdatePayload(raw.detail);
      if(raw && raw.data != null && raw.source !== window) return parseRuntimeUpdatePayload(raw.data);
      return raw && typeof raw === "object" ? raw : null;
    }

    function applyRuntimeUpdate(raw){
      const data = parseRuntimeUpdatePayload(raw);
      if(!data || String(data.__overlayName || "dc_gui_runtime") !== "dc_gui_runtime") return;
      DCLOG("applyRuntimeUpdate", data);
      INIT = Object.assign({}, INIT || {}, data || {});
      if(data.gui) GUI = data.gui;
      if(data.bindings) BIND = data.bindings;
      else if(INIT.bindings) BIND = INIT.bindings;
      render();
    }

    if(window.cnpc && typeof window.cnpc.onEvent === "function"){
      window.cnpc.onEvent("dcDialogueUpdate", applyRuntimeUpdate);
      window.cnpc.onEvent("message", function(data){
        const payload = parseRuntimeUpdatePayload(data);
        if(payload && payload.type === "dcDialogueUpdate") applyRuntimeUpdate(payload);
      });
    }
    window.addEventListener("message", function(event){
      const payload = parseRuntimeUpdatePayload(event);
      if(payload && (payload.type === "dcDialogueUpdate" || payload.__event === "dcDialogueUpdate")) applyRuntimeUpdate(payload);
    });

    window.addEventListener("resize", () => { render(); });
    render();
  })();
  </script>
</body>
</html>
